# Deploy on the homelab host alongside cliproxyapi.
# Public URL via Cloudflare Tunnel: https://bot.jclee.me
#
# Usage (on the homelab host as root):
#   cd /opt/github-bot && docker compose -f docker-compose.github_app.yml up -d
#
# Required: /opt/github-bot/.env with secrets (see below).
#   GITHUB_APP_ID=...
#   GITHUB_PRIVATE_KEY="-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----"
#   GITHUB_WEBHOOK_SECRET=...
#   CLIPROXY_API_KEY=sk-cliproxy-github-bot-...
services:
  github-bot-app:
    image: registry.jclee.me/github-bot-app:latest
    container_name: github-bot-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"   # bind to localhost; CF tunnel ingress to localhost:3001
    env_file:
      - .env
    environment:
      # GitHub App auth (dynaconf reads dotted keys from env)
      GITHUB.DEPLOYMENT_TYPE: app
      GITHUB.APP_ID: "${GITHUB_APP_ID}"
      GITHUB.PRIVATE_KEY: "${GITHUB_PRIVATE_KEY}"
      GITHUB.WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET}"

      # CLIProxyAPI (OpenAI-compatible homelab gateway)
      OPENAI.KEY: "${CLIPROXY_API_KEY}"
      OPENAI.API_BASE: https://cliproxy.jclee.me/v1
      CONFIG.MODEL: gpt-5.5
      CONFIG.FALLBACK_MODELS: '["minimax-m3"]'
      CONFIG.CUSTOM_MODEL_MAX_TOKENS: "128000"
      CONFIG.AI_TIMEOUT: "180"
      PR_REVIEWER.AUTO_CREATE_ISSUES: "true"
      PR_REVIEWER.AUTO_CREATE_ISSUE_LABELS: '["jclee-bot", "review-finding"]'
      PR_REVIEWER.AUTO_CREATE_ISSUE_SECURITY_LABELS: '["security", "critical"]'
      PR_REVIEWER.AUTO_CREATE_ISSUE_BUG_LABELS: '["bug", "critical"]'


      # github_app commands fired automatically per event
      GITHUB_APP.PR_COMMANDS: '["/describe", "/review", "/improve"]'
      GITHUB_APP.HANDLE_PR_ACTIONS: '["opened", "reopened", "ready_for_review"]'
      GITHUB_APP.HANDLE_PUSH_TRIGGER: "true"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - cliproxy_net

  # Filebeat: ship logs to Elasticsearch
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.0
    container_name: filebeat-github-bot
    # Copy the read-only bind-mounted config to a root-owned 0600 file inside
    # the container, then run with strict.perms ENABLED. This satisfies
    # Filebeat's permission check regardless of the host file's owner/mode,
    # without the insecure --strict.perms=false bypass (security finding).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        cp /usr/share/filebeat/filebeat.yml /tmp/filebeat.yml &&
        chown root:root /tmp/filebeat.yml &&
        chmod 0600 /tmp/filebeat.yml &&
        exec filebeat -e -c /tmp/filebeat.yml
    restart: unless-stopped
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat-data:/usr/share/filebeat/data
    environment:
      # Elasticsearch host (homelab-elk). Set ELASTICSEARCH_HOSTS in .env to the
      # live node URL; credentials are required (security enabled).
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_HOSTS}
      - ELASTICSEARCH_USERNAME=${ELK_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELK_PASSWORD}
    networks:
      - cliproxy_net
    depends_on:
      - github-bot-app

  # Auto-update: poll registry every 60s and restart app when image changes.
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      # CLEANUP disabled: when watchtower removes the OLD image immediately after
      # detecting a new one, it can lose the running container's image metadata and
      # dead-locks with 'No such image ... no available image info. Proceeding to
      # next.' on every poll, never actually updating. Keep old images; prune via
      # a separate scheduled 'docker image prune' if disk pressure matters.
      - WATCHTOWER_CLEANUP=false
      # Only manage containers that are actually running; INCLUDE_STOPPED caused
      # watchtower to also track exited build/CI containers and amplified the
      # missing-image races above.
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_ROLLING_RESTART=true
      - DOCKER_API_VERSION=1.40
    networks:
      - cliproxy_net

networks:
  cliproxy_net:
    external: true
    name: cliproxyapi_backend   # piggyback on existing cliproxy network on the homelab host

volumes:
  filebeat-data:
