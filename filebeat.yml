# Filebeat configuration for GitHub App log shipping to Elasticsearch
# Deployed alongside github-bot-app in docker-compose.github_app.yml

filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true
          when:
            regexp:
              message: '^\{'
      - drop_fields:
          fields: ["agent", "ecs", "input", "log.file", "log.offset"]
          ignore_missing: true

# Only collect logs from github-bot-app container
  - type: log
    paths:
      - /var/log/github-bot/*.log
    fields:
      service: github-bot
    fields_under_root: true
    processors:
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true
          when:
            regexp:
              message: '^\{'

output.elasticsearch:
  # 192.168.50.105:9200 is the live homelab-elk node. The previous
  # 192.168.50.102 address is dead (connection refused), which silently
  # broke github-bot-logs-* shipping. Host/credentials are overridable via the
  # ELASTICSEARCH_HOSTS / ELASTICSEARCH_USERNAME / ELASTICSEARCH_PASSWORD env.
  hosts: ["${ELASTICSEARCH_HOSTS:http://192.168.50.105:9200}"]
  username: "${ELASTICSEARCH_USERNAME:elastic}"
  password: "${ELASTICSEARCH_PASSWORD:}"
  index: "github-bot-logs-%{+yyyy.MM.dd}"
  template:
    name: "github-bot-logs"
    pattern: "github-bot-logs-*"
    enabled: true

# Index lifecycle management
setup.ilm:
  enabled: true
  policy_name: "github-bot-logs"
  pattern: "{now/d}-000001"
  rollover_alias: "github-bot-logs"

setup.template:
  name: "github-bot-logs"
  pattern: "github-bot-logs-*"
  enabled: true
  settings:
    index.number_of_shards: 1
    index.number_of_replicas: 0
    index.refresh_interval: "5s"

# General settings
logging.level: warning
logging.to_files: false
logging.to_stderr: true

# Avoid duplicate log shipping
filebeat.registry.flush: 5s
