# Filebeat configuration for GitHub App log shipping to Elasticsearch
# Deployed alongside jclee-bot-app in docker-compose.github_app.yml

filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true
          when:
            regexp:
              message: '^\{'
      - drop_fields:
          fields: ["agent", "ecs", "input", "log.file", "log.offset"]
          ignore_missing: true

# Only collect logs from jclee-bot-app container
  - type: log
    paths:
      - /var/log/jclee-bot/*.log
    fields:
      service: jclee-bot
    fields_under_root: true
    processors:
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true
          when:
            regexp:
              message: '^\{'

output.elasticsearch:
  # Host/credentials are provided via the ELASTICSEARCH_HOSTS /
  # ELASTICSEARCH_USERNAME / ELASTICSEARCH_PASSWORD env vars (set in .env).
  hosts: ["${ELASTICSEARCH_HOSTS}"]
  username: "${ELASTICSEARCH_USERNAME:elastic}"
  password: "${ELASTICSEARCH_PASSWORD:}"
  index: "jclee-bot-logs-%{+yyyy.MM.dd}"
  template:
    name: "jclee-bot-logs"
    pattern: "jclee-bot-logs-*"
    enabled: true

# Index lifecycle management
setup.ilm:
  enabled: true
  policy_name: "jclee-bot-logs"
  pattern: "{now/d}-000001"
  rollover_alias: "jclee-bot-logs"

setup.template:
  name: "jclee-bot-logs"
  pattern: "jclee-bot-logs-*"
  enabled: true
  settings:
    index.number_of_shards: 1
    index.number_of_replicas: 0
    index.refresh_interval: "5s"

# General settings
logging.level: warning
logging.to_files: false
logging.to_stderr: true

# Avoid duplicate log shipping
filebeat.registry.flush: 5s
