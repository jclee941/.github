      auto_merge: true

  # Private repos (3)
  - name: hycu
    visibility: private
    default_branch: master
    automation:
      deploy_workflows: true
      branch_protection: true
      health_check: true
      auto_merge: true

  - name: youtube
    visibility: private
    default_branch: master
    automation:
      deploy_workflows: true
      branch_protection: true
      health_check: true
      auto_merge: true

  - name: propose
    visibility: private
    default_branch: master
    automation:
      deploy_workflows: true
      branch_protection: true
      health_check: true
      auto_merge: true

  # Canary target: jclee-bot Runtime Health Check creates synthetic PRs here.
  # Standard automation still applies so canary PRs run through real CI gates.
  - name: automation-e2e-public
    visibility: public
    default_branch: main
    automation:
      deploy_workflows: true
      branch_protection: true
      health_check: false  # this repo IS the health check target; no recursive check
      auto_merge: true

  # Fork (excluded from deploy but included in protection)
  - name: pr-agent
    visibility: public
    default_branch: main
    automation:
      deploy_workflows: false  # upstream fork, don't overwrite
      branch_protection: false # uses upstream workflows
      health_check: false
      auto_merge: false
