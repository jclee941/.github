# Canonical repository inventory for jclee941 automation
# Single source of truth — all scripts/workflows consume this file

repositories:
  # Source of truth (this repo)
  - name: jclee-bot
    visibility: public
    default_branch: master
    automation:
      deploy_workflows: false  # source repo, don't self-deploy
      branch_protection: true
      health_check: true
      auto_merge: true
    metadata:
      description: "GitHub App automation platform for jclee941 repositories"
      topics: [automation, github-app, github-actions, gitops]
      homepage: "https://jclee941.github.io/jclee-bot/"

