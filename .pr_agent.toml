# Fork-specific overrides for jclee941/github-bot
# See AGENTS.md for full context

[config]
# FORK: route all LLM calls through homelab CLIProxyAPI (OpenAI-compatible)
# Models available: openai/gpt-5.2, claude-sonnet-4-6, gpt-5.1-codex-max, gemini-2.5-flash, ...
model = "openai/gpt-5.2"
fallback_models = ["claude-sonnet-4-6"]

[openai]
# FORK: CLIProxyAPI endpoint on homelab LXC 100 (cliproxy.homelab.local)
# The api_key is NOT set here; use env var OPENAI_KEY from GitHub Secrets or .env
api_base = "http://192.168.50.114:8317/v1"

[pr_reviewer]
enable_review_labels_effort = true
enable_auto_approval = true

[github_app]
pr_commands = [
  "/describe --pr_description.publish_description_as_comment=true",
  "/improve",
  "/agentic_review",
]

handle_push_trigger = true
push_commands = ["/improve", "/agentic_review"]

[review_agent]
enabled = true
publish_output = true
