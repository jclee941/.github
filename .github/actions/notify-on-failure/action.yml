name: Notify on failure
description: >-
  Create or comment on a deduplicated GitHub issue when a workflow step fails.
  De-dupes by (workflow name, head sha) so re-runs and matrix legs share a
  single issue rather than fanning out new ones per run.

inputs:
  title:
    description: Issue title (default = "[ci-fail] <workflow> @ <short_sha>")
    required: false
    default: ''
  body:
    description: Issue body markdown (default includes workflow + run link)
    required: false
    default: ''
  labels:
    description: Comma-separated extra labels to add (always combined with `ci-failure`)
    required: false
    default: ''
  github-token:
    description: Deprecated; issue mutation is delegated to jclee-bot
    required: false
    default: ''
  jclee-bot-token:
    description: Token accepted by jclee-bot /api/v1/issue_commands
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Create or update failure issue
      shell: bash
      env:
        JCLEE_BOT_TOKEN: ${{ inputs.jclee-bot-token }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_BODY: ${{ inputs.body }}
        INPUT_LABELS: ${{ inputs.labels }}
        WF_NAME: ${{ github.workflow }}
        HEAD_SHA: ${{ github.sha }}
        RUN_ID: ${{ github.run_id }}
        SERVER_URL: ${{ github.server_url }}
        REPO: ${{ github.repository }}
      run: |
        set -eu
        if [ -z "${JCLEE_BOT_TOKEN:-}" ]; then
          echo "::warning::jclee-bot issue command token is not configured; skipping failure issue automation."
          exit 0
        fi
        SHORT_SHA="${HEAD_SHA:0:8}"
        TITLE="${INPUT_TITLE:-[ci-fail] $WF_NAME @ $SHORT_SHA}"
        RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
        BODY="${INPUT_BODY:-$WF_NAME workflow failed on \`$HEAD_SHA\`. See [run logs]($RUN_URL).}"
        LABELS="ci-failure"
        if [ -n "$INPUT_LABELS" ]; then
          LABELS="$LABELS,$INPUT_LABELS"
        fi
        payload="$(jq -cn \
          --arg repo "$REPO" \
          --arg title "$TITLE" \
          --arg body "$BODY" \
          --arg labels "$LABELS" \
          '{repository: $repo, commands: [{type: "upsert_issue", title: $title, body: $body, labels: $labels}]}')"
        curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
          -X POST "https://bot.jclee.me/api/v1/issue_commands" \
          -H "Authorization: Bearer ${JCLEE_BOT_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$payload" \
          || echo "::warning::jclee-bot failure issue command failed"
