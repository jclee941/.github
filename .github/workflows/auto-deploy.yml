name: Auto Deploy Workflows

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - 'scripts/deploy-to-repos.go'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Dry-run preview
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "Previewing deployment changes..."
          go run scripts/deploy-to-repos.go --dry-run

      - name: Deploy to all repos
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "Deploying updated workflows to all jclee941/* repos..."
          go run scripts/deploy-to-repos.go

      - name: Create failure issue
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          gh issue create --repo ${{ github.repository }} \
            --title "chore: auto-deploy failed on ${{ github.sha }}" \
            --body "Workflow auto-deployment failed.\n\n- Commit: ${{ github.sha }}\n- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nPlease investigate and re-run if needed."
