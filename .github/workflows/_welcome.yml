name: _Welcome

# Reusable workflow: welcome first-time contributors.
# Called by downstream repos' welcome.yml.

on:
  workflow_call:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: welcome-${{ github.ref }}
  cancel-in-progress: true

jobs:
  welcome:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Welcome first interaction
        uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome! Thanks for opening your first issue. We appreciate your contribution.
          pr-message: |
            Welcome! Thanks for opening your first pull request. Please ensure your PR follows our contribution guidelines.
