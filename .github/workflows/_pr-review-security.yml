name: _PR Security Review

# Reusable workflow: deep security review via CLIProxyAPI.
# Called by downstream repos' pr-review-security.yml.

on:
  workflow_call:
    secrets:
      CLIPROXY_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-review-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security_review:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    name: Deep security review via CLIProxyAPI
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check out base branch
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install pr-agent
        run: |
          python -m pip install --upgrade pip --no-cache-dir
          pip install -e .

      - name: Run security review
        env:
          CLIPROXY_API_KEY: ${{ secrets.CLIPROXY_API_KEY }}
          GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI.KEY: ${{ secrets.CLIPROXY_API_KEY }}
          OPENAI.API_BASE: https://cliproxy.jclee.me/v1
          CONFIG.MODEL: kimi-k2.6
          CONFIG.FALLBACK_MODELS: "[kimi-k2.5, minimax-m2.7]"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "128000"
        run: |
          set -e
          PR_URL="${{ github.event.pull_request.html_url }}"
          echo "Running security review on $PR_URL"
          python -m pr_agent.cli --pr_url "$PR_URL" review --security 2>&1 | tee /tmp/pr-agent-security.log || true
          # Check for fatal errors
          if grep -qE "Failed to generate prediction with any model|Failed to review PR|AuthenticationError" /tmp/pr-agent-security.log; then
            echo "::error::Security review failed fatally"
            exit 1
          fi
