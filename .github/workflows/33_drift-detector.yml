name: Drift Detector

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'scripts/cmd/deploy-to-repos/**'
      - 'scripts/cmd/drift-detector/**'
      - 'config/repos.yaml'
  workflow_run:
    workflows: ["Auto Deploy Workflows"]
    types: [completed]
  workflow_dispatch:
    inputs:
      self_heal:
        description: 'Auto-deploy fixes for drifted repos'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  issues: write

concurrency:
  group: drift-detector
  cancel-in-progress: false

jobs:
  detect:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    outputs:
      has_drift: ${{ steps.drift.outputs.has_drift }}
      drift_repos: ${{ steps.drift.outputs.drift_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout source repo
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect drift
        id: drift
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          set -eu
          cd scripts
          go run ./cmd/drift-detector --format=json > /tmp/drift-report.json || true
          if [ -s /tmp/drift-report.json ]; then
            python3 -c "import json; d=json.load(open('/tmp/drift-report.json')); json.dump({'report': d}, open('/tmp/drift-input.json','w'))" || true
            python3 "$GITHUB_WORKSPACE/scripts/llm_decide.py" \
              --decision-type drift \
              --input /tmp/drift-input.json \
              --output /tmp/drift-llm.out || true
            LLM_OK=$(grep '^ok=' /tmp/drift-llm.out 2>/dev/null | tail -1 | cut -d= -f2- || true)
            LLM_ACTION=$(grep '^action=' /tmp/drift-llm.out 2>/dev/null | tail -1 | cut -d= -f2- || true)
            if [ "$LLM_OK" = "true" ]; then
              if [ "$LLM_ACTION" = "drift" ]; then
                echo "has_drift=true" >> "$GITHUB_OUTPUT"
                repos=$(python3 -c "import json; d=json.load(open('/tmp/drift-report.json')); print(json.dumps(d.get('repos',[])))" 2>/dev/null || echo '[]')
                echo "drift_repos=$repos" >> "$GITHUB_OUTPUT"
                cat /tmp/drift-report.json
              else
                echo "has_drift=false" >> "$GITHUB_OUTPUT"
                echo "drift_repos=[]" >> "$GITHUB_OUTPUT"
                echo "LLM marked drift report clean/noop"
              fi
            else
              echo "has_drift=true" >> "$GITHUB_OUTPUT"
              # Extract repo list as JSON array for matrix strategy
              repos=$(python3 -c "import json; d=json.load(open('/tmp/drift-report.json')); print(json.dumps(d.get('repos',[])))" 2>/dev/null || echo '[]')
              echo "drift_repos=$repos" >> "$GITHUB_OUTPUT"
              cat /tmp/drift-report.json
            fi
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "drift_repos=[]" >> "$GITHUB_OUTPUT"
            echo "No drift detected"
          fi

      - name: Create or update drift issue
        if: steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/drift-report.json', 'utf8');
            const title = '[drift] Downstream automation drift detected';

            // Search for existing open drift issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift,bot',
              per_page: 10
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body + '\n\n_Updated: ' + new Date().toISOString() + '_'
              });
              console.log('Updated drift issue #' + existing.number);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body + '\n\n_Created: ' + new Date().toISOString() + '_',
                labels: ['drift', 'bot', 'automation']
              });
              console.log('Created drift issue #' + created.data.number);
            }

  heal:
    needs: detect
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.self_heal == 'true' && needs.detect.outputs.has_drift == 'true'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.detect.outputs.drift_repos) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout source repo
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Deploy fix for ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          cd scripts
          echo "Deploying fix for ${{ matrix.repo }}..."
          go run ./cmd/deploy-to-repos --repos=${{ matrix.repo }}
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          title: '🚨 Drift Detector Failed'
