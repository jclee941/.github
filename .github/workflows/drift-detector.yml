name: Drift Detector

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 09:00 UTC
  workflow_dispatch:
    inputs:
      self_heal:
        description: 'Auto-deploy fixes for drifted repos'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  issues: write

concurrency:
  group: drift-detector
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    outputs:
      has_drift: ${{ steps.drift.outputs.has_drift }}
      drift_repos: ${{ steps.drift.outputs.drift_repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout source repo
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Detect drift
        id: drift
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          cd scripts
          go run ./cmd/drift-detector --format=json > /tmp/drift-report.json || true
          if [ -s /tmp/drift-report.json ]; then
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            # Extract repo list as JSON array for matrix strategy
            repos=$(python3 -c "import json; d=json.load(open('/tmp/drift-report.json')); print(json.dumps(d.get('repos',[])))" 2>/dev/null || echo '[]')
            echo "drift_repos=$repos" >> "$GITHUB_OUTPUT"
            cat /tmp/drift-report.json
          else
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "drift_repos=[]" >> "$GITHUB_OUTPUT"
            echo "No drift detected"
          fi

      - name: Create or update drift issue
        if: steps.drift.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/drift-report.json', 'utf8');
            const title = '[drift] Downstream automation drift detected';

            // Search for existing open drift issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift,bot',
              per_page: 10
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body + '\n\n_Updated: ' + new Date().toISOString() + '_'
              });
              console.log('Updated drift issue #' + existing.number);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body + '\n\n_Created: ' + new Date().toISOString() + '_',
                labels: ['drift', 'bot', 'automation']
              });
              console.log('Created drift issue #' + created.data.number);
            }

  heal:
    needs: detect
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.self_heal == 'true' && needs.detect.outputs.has_drift == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.detect.outputs.drift_repos) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout source repo
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Deploy fix for ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          cd scripts
          echo "Deploying fix for ${{ matrix.repo }}..."
          go run ./cmd/deploy-to-repos --repos=${{ matrix.repo }}
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Drift Detector Failed: ${context.runId}`,
              body: `Drift detection workflow failed. See [run logs](${context.payload.repository.html_url}/actions/runs/${context.runId}).`
              });
            } catch (e) {
              core.warning(`Could not create issue: ${e.message}`);
            }
