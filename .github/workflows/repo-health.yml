name: Repository Health Check

on:
  # Manual trigger
  workflow_dispatch:
  # Weekly check (Mondays 02:00 UTC)
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: read
  issues: write

concurrency:
  group: repo-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      repos: ${{ steps.discover.outputs.repos }}
    steps:
      - name: Discover repos
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repos=$(gh api orgs/jclee941/repos --paginate \
            --jq '.[] | select(.archived == false) | .name' \
            | sort | uniq | jq -R . | jq -s -c .)
          echo "repos=$repos" >> "$GITHUB_OUTPUT"
          echo "Discovered repos: $repos"

  check-health:
    needs: discover-repos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover-repos.outputs.repos) }}
    steps:
      - name: Check repository health
        uses: actions/github-script@v7
        env:
          REPO_NAME: ${{ matrix.repo }}
        with:
          script: |
            const repo = process.env.REPO_NAME;
            const owner = context.repo.owner;
            const requiredFiles = [
              { path: 'README.md', label: 'documentation', critical: true },
              { path: 'CONTRIBUTING.md', label: 'documentation', critical: false },
              { path: 'LICENSE', label: 'legal', critical: true },
            ];

            const missing = [];
            for (const file of requiredFiles) {
              try {
                await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: file.path,
                });
              } catch (e) {
                if (e.status === 404) {
                  missing.push(file);
                }
              }
            }

            if (missing.length === 0) {
              console.log(`Ôťů ${repo}: all required files present`);
              return;
            }

            const criticalMissing = missing.filter(f => f.critical);
            const bodyLines = [
              `## ­čĆą ŰáłÝĆČýžÇÝćáŰŽČ ŕ▒┤ŕ░Ľ ŕ▓Çýžä ŕ▓░ŕ│╝`,
              '',
              `ŰáłÝĆČýžÇÝćáŰŽČ \`${owner}/${repo}\`ýŁś ÝĽäýłś ŰČŞýäť ÝîîýŁ╝ýŁä ýáÉŕ▓ÇÝľłýŐÁŰőłŰőĄ.`,
              '',
              '### ŰłäŰŁŻŰÉť ÝîîýŁ╝',
              '',
              ...missing.map(f => `- [ ] \`${f.path}\` ${f.critical ? '**(ÝĽäýłś)**' : '(ŕÂîý×ą)'}`),
              '',
              '### ŕÂîý×ą ýí░ý╣ś',
              '',
              '1. `README.md` ÔÇö ÝöäŰíťýáŁÝŐŞ ýćîŕ░ť, ýäĄý╣ś/ýéČýÜę Ű░ęŰ▓Ľ, ŕŞ░ýŚČ ŕ░ÇýŁ┤Űôť',
              '2. `CONTRIBUTING.md` ÔÇö ŕŞ░ýŚČý×ÉŰą╝ ýťäÝĽť ŕ░ÇýŁ┤ŰôťŰŁ╝ýŁŞ',
              '3. `LICENSE` ÔÇö ýśĄÝöłýćîýŐĄ ŰŁ╝ýŁ┤ýäáýŐĄ',
              '',
              '> ý×ÉŰĆÖ ýâŁýä▒ŰÉĘ (Repository Health Check Workflow)',
            ];

            const title = criticalMissing.length > 0
              ? `[BOT] ÝĽäýłś ŰČŞýäť ŰłäŰŁŻ: ${missing.map(f => f.path).join(', ')}`
              : `[BOT] ŕÂîý×ą ŰČŞýäť ŰłäŰŁŻ: ${missing.map(f => f.path).join(', ')}`;

            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              labels: 'documentation,repo-health',
              state: 'open',
            });
            const existing = issues.find(i => i.title.includes('ŰČŞýäť ŰłäŰŁŻ'));

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: bodyLines.join('\n'),
              });
              console.log(`­čöä Updated issue #${existing.number} in ${repo}`);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: bodyLines.join('\n'),
                labels: ['documentation', 'repo-health'],
              });
              console.log(`­čôŁ Created health issue in ${repo}`);
            }
