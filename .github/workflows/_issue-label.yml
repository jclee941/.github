name: _Issue Label

# Reusable workflow: auto-label issues.
# Called by downstream repos' issue-label.yml.

on:
  workflow_call:

permissions:
  issues: write

jobs:
  label:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Auto-label issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            if (!issue) return;
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const labelsToAdd = [];
            if (title.includes('bug') || title.includes('fix') || body.includes('bug')) labelsToAdd.push('bug');
            if (title.includes('feat') || title.includes('feature') || title.includes('add')) labelsToAdd.push('enhancement');
            if (title.includes('docs') || title.includes('doc')) labelsToAdd.push('documentation');
            if (title.includes('security') || title.includes('vuln')) labelsToAdd.push('security');
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
              console.log(`Issue #${issue.number}: added labels ${labelsToAdd.join(', ')}`);
            } else {
              console.log(`Issue #${issue.number}: no matching labels`);
            }
