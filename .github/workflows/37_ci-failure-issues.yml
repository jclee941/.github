name: CI Failure Issues

on:
  workflow_run:
    workflows:
      - "Sanity"
      - "Runtime Health Check"
      - "ELK Health Check"
      - "ELK Setup"
      - "Downstream Health Check"
      - "Bot Health Monitor"
      - "Repository Health Check"
      - "Auto Hardcode Scan"
      - "Live E2E Tests"
    types: [completed]
  repository_dispatch:
    types: [ci-failure-sweep]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Skip actual issue mutations
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-failure-issues-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  call-jclee-bot:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Delegate CI failure issue automation to jclee-bot
        env:
          CI_FAILURE_ISSUES_TOKEN: ${{ secrets.CI_FAILURE_ISSUES_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: master
          WF_RUN_NAME: ${{ github.event.workflow_run.name || '' }}
          WF_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          WF_RUN_ID: ${{ github.event.workflow_run.id || '0' }}
          WF_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WF_RUN_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number || '0' }}
          WF_RUN_URL: ${{ github.event.workflow_run.html_url || '' }}
        run: |
          set -euo pipefail
          if [ -z "${CI_FAILURE_ISSUES_TOKEN:-}" ]; then
            echo "::warning::CI_FAILURE_ISSUES_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot CI failure issue automation."
            exit 0
          fi

          if [ "${EVENT_NAME}" = "workflow_run" ]; then
            payload="$(jq -cn \
              --arg repo "${REPOSITORY}" \
              --arg default_branch "${DEFAULT_BRANCH}" \
              --arg name "${WF_RUN_NAME}" \
              --arg head_sha "${WF_RUN_HEAD_SHA}" \
              --argjson run_id "${WF_RUN_ID}" \
              --arg conclusion "${WF_RUN_CONCLUSION}" \
              --argjson pr_number "${WF_RUN_PR_NUMBER}" \
              --arg run_url "${WF_RUN_URL}" \
              --argjson dry_run "${DRY_RUN}" \
              '{repository: $repo, default_branch: $default_branch, dry_run: $dry_run, workflow_run: {name: $name, head_sha: $head_sha, id: $run_id, conclusion: $conclusion, pr_number: $pr_number, run_url: $run_url}}')"
          else
            payload="$(jq -cn \
              --arg repo "${REPOSITORY}" \
              --arg default_branch "${DEFAULT_BRANCH}" \
              --argjson dry_run "${DRY_RUN}" \
              '{repository: $repo, default_branch: $default_branch, dry_run: $dry_run}')"
          fi

          curl -fsS --retry 3 --retry-delay 5 --max-time 600 \
            -X POST "https://bot.jclee.me/api/v1/ci_failure_issues" \
            -H "Authorization: Bearer ${CI_FAILURE_ISSUES_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            | tee ci-failure-issues-result.json
          jq -e '.actions | type == "array"' ci-failure-issues-result.json >/dev/null
