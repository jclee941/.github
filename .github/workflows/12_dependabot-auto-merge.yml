name: Dependabot Auto Merge

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dependabot-auto-merge-retired-${{ github.ref }}
  cancel-in-progress: false

jobs:
  retired:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report App ownership
        run: |
          echo "Dependabot PR merge policy is owned by the jclee-bot GitHub App."
          echo "This workflow is a non-mutating placeholder retained for inventory stability."
