name: App Issue Maintenance

on:
  workflow_run:
    workflows: ["Sanity"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Report planned issue actions without mutating repositories
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: app-issue-maintenance
  cancel-in-progress: false

jobs:
  issue-maintenance:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Run App-owned issue maintenance
        env:
          ISSUE_MAINTENANCE_TOKEN: ${{ secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_MAINTENANCE_TOKEN:-}" ]; then
            echo "::warning::APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping App issue maintenance."
            exit 0
          fi
          curl -fsS --retry 3 --retry-delay 5 --max-time 600 \
            -X POST "https://bot.jclee.me/api/v1/issue_maintenance" \
            -H "Authorization: Bearer ${ISSUE_MAINTENANCE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"dry_run\": ${DRY_RUN}, \"background\": false, \"owner\": \"jclee941\"}" \
            | tee issue-maintenance-result.json
          jq -e '.repositories | type == "array"' issue-maintenance-result.json >/dev/null
