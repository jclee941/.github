name: Managed Repository Standardization

on:
  push:
    branches: [master]
    paths:
      - 'config/repos.yaml'
      - '.github/workflows/18_repo-standardization.yml'
  workflow_run:
    workflows: ["Sanity"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview repository standardization without mutating target repos
        required: false
        type: boolean
        default: true
      repos:
        description: Optional comma-separated managed repo names
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: repo-standardization-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  standardize:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    timeout-minutes: 20
    env:
      REPO_STANDARDIZATION_TOKEN: ${{ secrets.REPO_STANDARDIZATION_TOKEN || secrets.REPO_METADATA_TOKEN }}
      REPO_STANDARDIZATION_TOKEN_AVAILABLE: ${{ secrets.REPO_STANDARDIZATION_TOKEN != '' || secrets.REPO_METADATA_TOKEN != '' }}
      REPO_STANDARDIZATION_URL: http://127.0.0.1:3001/api/v1/repo_standardization
      INPUT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      INPUT_REPOS: ${{ github.event_name == 'workflow_dispatch' && inputs.repos || '' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve mode
        id: mode
        run: |
          set -euo pipefail
          mode="apply"
          dry_run="false"
          repos="${INPUT_REPOS}"
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            dry_run="true"
            mode="dry-run"
          elif [ "${REPO_STANDARDIZATION_TOKEN_AVAILABLE}" != "true" ]; then
            echo "::error::REPO_STANDARDIZATION_TOKEN or REPO_METADATA_TOKEN is required for App-owned repository standardization."
            exit 1
          fi
          {
            printf 'dry_run=%s\n' "${dry_run}"
            printf 'mode=%s\n' "${mode}"
            printf 'repos=%s\n' "${repos}"
          } >> "$GITHUB_OUTPUT"

      - name: Delegate repository standardization to jclee-bot
        run: |
          set -euo pipefail
          if [ "${REPO_STANDARDIZATION_TOKEN_AVAILABLE}" != "true" ]; then
            echo "::warning::Skipping repository standardization dry-run because no App automation token is configured."
            exit 0
          fi
          REPO_STANDARDIZATION_REPOS="${{ steps.mode.outputs.repos }}" \
          REPO_STANDARDIZATION_DRY_RUN="${{ steps.mode.outputs.dry_run }}" \
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repos = os.environ.get("REPO_STANDARDIZATION_REPOS", "")
          token = os.environ.get("REPO_STANDARDIZATION_TOKEN", "")
          url = os.environ.get("REPO_STANDARDIZATION_URL", "http://127.0.0.1:3001/api/v1/repo_standardization")
          payload = json.dumps({
              "owner": "jclee941",
              "dry_run": os.environ.get("REPO_STANDARDIZATION_DRY_RUN") == "true",
              "repos": repos,
              "background": False,
          }).encode()
          request = urllib.request.Request(
              url,
              data=payload,
              headers={
                  "Authorization": "Bearer " + token,
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=900) as response:
                  body = response.read().decode()
          except urllib.error.HTTPError as error:
              print(error.read().decode(), file=sys.stderr)
              raise
          print(body)
          result = json.loads(body)
          summary = result.get("summary", {})
          if result.get("error") or summary.get("status") == "failed":
              message = "Repository standardization failed: {}".format(
                  result.get("error") or summary.get("failed_steps", [])
              )
              print(message, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Managed Repository Standardization"
            echo ""
            echo "- Mode: ${{ steps.mode.outputs.mode }}"
            echo "- Inventory: \`config/repos.yaml\`"
            echo "- Execution: delegated to \`jclee-bot\` App endpoint \`/api/v1/repo_standardization\`"
            echo "- Repository metadata, downstream docs, branch protection, and rulesets are App-owned"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
