name: _Labeler

# Reusable workflow: auto-label PRs based on changed files.
# Called by downstream repos' labeler.yml.

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for labeler config
        id: check
        run: |
          if [ -f .github/labeler.yml ]; then
            echo "has-config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-config=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No .github/labeler.yml found; skipping auto-label"
          fi

      - name: Run labeler
        if: steps.check.outputs.has-config == 'true'
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
