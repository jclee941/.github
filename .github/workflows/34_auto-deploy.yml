name: Auto Deploy Workflows

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - '.github/dependabot.yml'
      - '.github/renovate.json'
      - '.github/CODEOWNERS'
      - '.github/CODEOWNERS'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - 'scripts/cmd/deploy-to-repos/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.ls-lint.yml'
      - 'requirements.txt'
      - 'pyproject.toml'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: auto-deploy
  cancel-in-progress: false  # do NOT cancel mid-deploy; let it finish or fail loudly

jobs:
  deploy:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Dry-run preview
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "Previewing deployment changes..."
          (cd scripts && go run ./cmd/deploy-to-repos --dry-run)

      - name: Deploy to all repos
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          echo "Deploying updated workflows to all jclee941/* repos..."
          (cd scripts && go run ./cmd/deploy-to-repos)

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          title: 'Auto-deploy failed'
