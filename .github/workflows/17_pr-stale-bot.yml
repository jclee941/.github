name: PR Stale Bot

on:
  schedule:
    - cron: '0 8 * * *'  # Daily 08:00 UTC (17:00 KST)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-stale-bot
  cancel-in-progress: false

jobs:
  stale-prs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Find and label stale PRs
        id: stale
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)
          STALE_PRS=""

          REPOS=$(gh api orgs/jclee941/repos --paginate --jq '.[] | select(.archived == false) | .name' 2>/dev/null | sort)
          if [ -z "$REPOS" ]; then
            echo "warning: could not fetch repo list from org"
            exit 0
          fi

          for REPO in $REPOS; do
            # Get open PRs with no activity in 30 days
            PULLS=$(gh api "repos/jclee941/$REPO/pulls" --state open --paginate \
              --jq ".[] | select(.updated_at < \"$CUTOFF\") | \"\\(.number)|\\(.title)|\\(.updated_at)\"" 2>/dev/null || true)

            for PR_INFO in $PULLS; do
              IFS='|' read -r NUM TITLE UPDATED <<< "$PR_INFO"
              DAYS_STALE=$(( ($(date +%s) - $(date -d "$UPDATED" +%s)) / 86400 ))

              # Add stale label and comment
              gh pr edit "$NUM" --repo "jclee941/$REPO" --add-label "stale" 2>/dev/null || true
              COMMENT_BODY=$(printf '🤖 **PR Stale Bot**\n\nThis PR has been inactive for **%s days** (last updated: %s).\n\n- If this PR is still relevant, please update or comment to keep it open.\n- If no longer needed, please close it.\n- Maintainers may close stale PRs after **60 days** of inactivity.\n\n_Auto-generated by pr-stale-bot workflow._' "$DAYS_STALE" "$UPDATED")
              gh pr comment "$NUM" --repo "jclee941/$REPO" --body "$COMMENT_BODY" 2>/dev/null || true

              STALE_PRS="${STALE_PRS}- **$REPO#$NUM**: $TITLE ($DAYS_STALE days stale)\n"
            done
          done

          if [ -z "$STALE_PRS" ]; then
            echo "stale_found=false" >> "$GITHUB_OUTPUT"
            echo "No stale PRs detected."
            exit 0
          fi

          echo "stale_found=true" >> "$GITHUB_OUTPUT"
          {
            echo "stale_list<<EOF"
            echo "$STALE_PRS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create summary issue
        if: steps.stale.outputs.stale_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STALE_LIST: ${{ steps.stale.outputs.stale_list }}
        run: |
          set -eu
          TITLE='[pr-stale-bot] Stale PRs detected'
          BODY=$(printf '%s\n' '## Stale PR Report' '' 'The following PRs have been inactive for 30+ days:' '' "$STALE_LIST" '' '_Auto-generated by pr-stale-bot workflow._')

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "pr-stale" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY" 2>/dev/null || true
            echo "Updated stale PR issue #$EXISTING"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY" --label "pr-stale,automation"
            echo "Created stale PR issue"
          fi
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
