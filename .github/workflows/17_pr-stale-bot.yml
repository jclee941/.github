name: PR Stale Bot

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review, closed]
  # NOTE: no `issue_comment:` trigger — 17 comments on stale PRs, which would
  # re-fire it via the comment event. Driven by pull_request + workflow_run.
  workflow_run:
    workflows: ["Sanity"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-stale-bot
  cancel-in-progress: false

jobs:
  stale-prs:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'
      - name: Find and label stale PRs
        id: stale
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          CLIPROXY_API_KEY: ${{ secrets.CLIPROXY_API_KEY }}
        run: |
          set -eu
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)
          STALE_PRS=""

          REPOS=$(cd scripts && go run ./cmd/repo-review --print-default-repos)
          if [ -z "$REPOS" ]; then
            echo "warning: could not resolve managed repo inventory"
            exit 0
          fi

          for REPO in $(echo "$REPOS" | tr ',' ' '); do
            # Get open PRs with no activity in 30 days
            PULLS=$(gh api "repos/jclee941/$REPO/pulls" --state open --paginate \
              --jq ".[] | select(.updated_at < \"$CUTOFF\") | \"\\(.number)|\\(.title)|\\(.updated_at)\"" 2>/dev/null || true)

            for PR_INFO in $PULLS; do
              IFS='|' read -r NUM TITLE UPDATED <<< "$PR_INFO"
              DAYS_STALE=$(( ($(date +%s) - $(date -d "$UPDATED" +%s)) / 86400 ))

              LLM_INPUT="${RUNNER_TEMP}/pr-stale-${REPO}-${NUM}.json"
              LLM_OUTPUT="${RUNNER_TEMP}/pr-stale-${REPO}-${NUM}.out"
              export REPO NUM TITLE UPDATED DAYS_STALE CUTOFF LLM_INPUT
              python3 -c "import json,os; json.dump({'repo':os.environ['REPO'],'number':int(os.environ['NUM']),'title':os.environ['TITLE'],'updated_at':os.environ['UPDATED'],'days_stale':int(os.environ['DAYS_STALE']),'cutoff':os.environ['CUTOFF']}, open(os.environ['LLM_INPUT'],'w'))" || true
              python3 scripts/llm_decide.py \
                --decision-type pr-stale \
                --input "$LLM_INPUT" \
                --output "$LLM_OUTPUT" || true
              LLM_OK=$(grep '^ok=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              LLM_ACTION=$(grep '^action=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
              if [ "$LLM_OK" = "true" ] && [ "$LLM_ACTION" != "stale" ]; then
                echo "  LLM marked jclee941/$REPO#$NUM active/noop; skipping stale label"
                continue
              fi

              COMMENT_BODY=$(printf '🤖 **PR Stale Bot**\n\nThis PR has been inactive for **%s days** (last updated: %s).\n\n- If this PR is still relevant, please update or comment to keep it open.\n- If no longer needed, please close it.\n- Maintainers may close stale PRs after **60 days** of inactivity.\n\n_Auto-generated by pr-stale-bot workflow._' "$DAYS_STALE" "$UPDATED")
              if [ -n "${ISSUE_COMMANDS_TOKEN:-}" ]; then
                payload="$(jq -cn \
                  --arg repo "jclee941/$REPO" \
                  --argjson number "$NUM" \
                  --arg body "$COMMENT_BODY"$'\n\n''_jclee-bot에의해자동화됨._' \
                  '{repository: $repo, commands: [{type: "label_issue", number: $number, labels: ["stale"], body: $body}]}')"
                curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
                  -X POST "https://bot.jclee.me/api/v1/issue_commands" \
                  -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "$payload" \
                  | jq -e '.actions | type == "array"' >/dev/null
              else
                echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot stale PR mutation."
              fi

              STALE_PRS="${STALE_PRS}- **$REPO#$NUM**: $TITLE ($DAYS_STALE days stale)\n"
            done
          done

          if [ -z "$STALE_PRS" ]; then
            echo "stale_found=false" >> "$GITHUB_OUTPUT"
            echo "No stale PRs detected."
            exit 0
          fi

          echo "stale_found=true" >> "$GITHUB_OUTPUT"
          {
            echo "stale_list<<EOF"
            echo "$STALE_PRS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create summary issue
        if: steps.stale.outputs.stale_found == 'true'
        env:
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          STALE_LIST: ${{ steps.stale.outputs.stale_list }}
        run: |
          set -eu
          if [ -z "${ISSUE_COMMANDS_TOKEN:-}" ]; then
            echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot issue command."
            exit 0
          fi
          TITLE='[pr-stale-bot] Stale PRs detected'
          BODY=$(printf '%s\n' '## Stale PR Report' '' 'The following PRs have been inactive for 30+ days:' '' "$STALE_LIST" '' '_jclee-bot에의해자동화됨._')
          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            '{repository: $repo, commands: [{type: "upsert_issue", title: $title, body: $body, labels: ["pr-stale", "automation"]}]}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
            -X POST "https://bot.jclee.me/api/v1/issue_commands" \
            -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '.actions | type == "array"' >/dev/null
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
