# Sanity CI — fast smoke test on every push/PR
# ---------------------------------------------
# Replaces upstream CI workflows removed from the fork.
# Catches import-breaking changes, invalid TOML, and regressions in
# `test_fix_json_escape_char.py` (minimum gate per AGENTS.md).
#
# Runs on GitHub-hosted runner — keep it fast (under 3 minutes).

name: Sanity

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: sanity-${{ github.ref }}
  cancel-in-progress: true
jobs:
  import-check:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    env:
      # Avoid import-time network calls in firewalled/offline CI; LiteLLM will use
      # its bundled model cost map instead of fetching from raw.githubusercontent.com.
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sanity-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sanity-
            ${{ runner.os }}-pip-

      - name: Install pr-agent
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -e .
          pip install pytest

      - name: Verify core package imports
        run: |
          set -eu
          python -c "import jclee_bot.review_engine as re; print('review_engine:', re.__file__)"
          python -c "from jclee_bot.review_engine.tools.pr_reviewer import PRReviewer; print('PRReviewer OK')"
          python -c "from jclee_bot.review_engine.tools.pr_description import PRDescription; print('PRDescription OK')"
          python -c "from jclee_bot.review_engine.tools.pr_code_suggestions import PRCodeSuggestions; print('PRCodeSuggestions OK')"
          python -c "from jclee_bot.review_engine.agent.pr_agent import PRAgent; print('PRAgent OK')"
          python -c "from jclee_bot.review_engine.servers.github_action_runner import run_action; print('github_action_runner OK')"

      - name: Verify fork config files parse
        run: |
          set -eu
          python3 -c "
          import tomllib
          c = tomllib.loads(open('.pr_agent.toml').read())
          print('.pr_agent.toml sections:', sorted(c.keys()))
          assert 'config' in c
          assert 'openai' in c
          assert c['config']['model'] == 'gpt-5.5', 'model override lost'
          assert c['openai']['api_base'] == 'https://cliproxy.jclee.me/v1', 'api_base lost'
          print('.pr_agent.toml OK')
          "
          python3 -c "
          import tomllib
          c = tomllib.loads(open('jclee_bot/review_engine/settings/configuration.toml').read())
          assert 'model' in c['config'], 'review-engine configuration.toml model field missing'
          print('jclee_bot/review_engine/settings/configuration.toml OK')
          "

      - name: Verify workflow YAML files parse
        run: |
          set -eu
          python3 -c "
          import yaml, os, glob
          for f in sorted(glob.glob('.github/workflows/*.y*ml')):
              with open(f) as fp:
                  try:
                      d = yaml.safe_load(fp)
                      print(f'{f}: OK ({d.get(\"name\", \"unnamed\")})')
                  except Exception as e:
                      print(f'{f}: FAIL — {e}')
                      raise SystemExit(1)
          "

      - name: Validate embedded github-script JavaScript syntax
        run: |
          set -eu
          # actionlint validates workflow structure but NOT the JS inside
          # actions/github-script steps. This guard runs `node --check` on every
          # embedded script so a missing brace can never ship again.
          python scripts/check_workflow_scripts.py

      - name: Validate automation policy unit tests
        run: |
          set -eu
          python -m pytest scripts/readme_mermaid_test.py scripts/test_llm_decide.py scripts/no_schedule_triggers_test.py -v

      - name: Verify LLM model config consistency across surfaces
        run: |
          set -eu
          python3 -c "
          import tomllib, re

          # Canonical fallback chain = source of truth in .pr_agent.toml.
          c = tomllib.loads(open('.pr_agent.toml').read())
          primary = c['config']['model']
          canonical_fb = c['config']['fallback_models']
          assert primary == 'gpt-5.5', f'primary model drifted: {primary}'
          assert canonical_fb == ['minimax-m3'], f'canonical fallback drifted: {canonical_fb}'
          print(f'canonical: primary={primary} fallback={canonical_fb}')

          # review-engine configuration.toml must share the same fallback chain.
          u = tomllib.loads(open('jclee_bot/review_engine/settings/configuration.toml').read())
          assert u['config']['fallback_models'] == canonical_fb, \
              f'configuration.toml fallback drift: {u[\"config\"][\"fallback_models\"]}'

          # Every workflow that sets CONFIG.FALLBACK_MODELS must match canonical.
          import glob
          fb_re = re.compile(r'CONFIG\.FALLBACK_MODELS:\s*(.+)')
          import json
          violations = []
          for f in sorted(glob.glob('.github/workflows/*.yml') + glob.glob('.github/workflows/**/*.yml')):
              for i, line in enumerate(open(f), 1):
                  m = fb_re.search(line)
                  if not m:
                      continue
                  raw = m.group(1).strip().strip(chr(39)).strip(chr(34))
                  try:
                      val = json.loads(raw)
                  except Exception:
                      continue  # templated/dynamic value; skip
                  if val != canonical_fb:
                      violations.append(f'{f}:{i} -> {val} (expected {canonical_fb})')
          if violations:
              print('FALLBACK DRIFT DETECTED:')
              for v in violations:
                  print('  ' + v)
              raise SystemExit(1)
          bad_nested = []
          for f in sorted(glob.glob('.github/workflows/*.yml') + glob.glob('.github/workflows/**/*.yml')):
              if f.endswith('/90_sanity.yml') or f.endswith('.github/workflows/90_sanity.yml'):
                  continue
              text = open(f).read()
              if any(key in text for key in ('OPENAI__KEY', 'OPENAI__API_BASE', 'CONFIG__MODEL', 'CONFIG__FALLBACK_MODELS')):
                  bad_nested.append(f)
          assert not bad_nested, f'workflows use non-canonical double-underscore pr-agent env names: {bad_nested}'
          print('All workflow CONFIG.FALLBACK_MODELS match canonical chain')
          "

      - name: Fast unittest smoke (AGENTS.md minimum gate)
        run: |
          python -m pytest tests/unittest/test_fix_json_escape_char.py tests/unittest/test_jclee_bot_checks.py tests/unittest/test_jclee_bot_app.py -v

      - name: Verify automation naming conventions
        run: |
          echo "Validating cross-file deployment invariants..."
          (cd scripts && go run ./cmd/validate-naming)
          echo "Naming conventions validated."
      - name: Verify file naming conventions (ls-lint)
        run: |
          curl -sL https://github.com/loeffel-io/ls-lint/releases/latest/download/ls-lint-linux-amd64 -o /tmp/ls-lint
          chmod +x /tmp/ls-lint
          /tmp/ls-lint
          echo "ls-lint passed"
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
