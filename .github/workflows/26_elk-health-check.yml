name: ELK Health Check

on:
  workflow_run:
    workflows: ["Build and Push App Image", "ELK Setup"]
    types: [completed]
  repository_dispatch:
    types: [elk-health-check]
  workflow_dispatch:

permissions:
  contents: read
  issues: read

concurrency:
  group: elk-health-check-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  elk-health-check:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Delegate ELK health to jclee-bot
        env:
          NATIVE_HEALTH_TOKEN: ${{ secrets.NATIVE_HEALTH_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          ELK_HOST: ${{ secrets.ELK_HOST }}
          ELK_USERNAME: ${{ secrets.ELK_USERNAME }}
          ELK_PASSWORD: ${{ secrets.ELK_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${NATIVE_HEALTH_TOKEN:-}" ]; then
            echo "::error::NATIVE_HEALTH_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured"
            exit 1
          fi
          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg elk_host "$ELK_HOST" \
            --arg elk_username "$ELK_USERNAME" \
            --arg elk_password "$ELK_PASSWORD" \
            '{
              repository: $repo,
              checks: ["elk_health"],
              elk_host: $elk_host,
              elk_username: $elk_username,
              elk_password: $elk_password
            }')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 180 \
            -X POST "https://bot.jclee.me/api/v1/native_health" \
            -H "Authorization: Bearer ${NATIVE_HEALTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '(.checks | all(.status == "healthy")) and (.actions | type == "array")' >/dev/null
