name: Organization Health Report

on:
  # NOTE: no `issues:` trigger — this workflow CREATES an org-health issue,
  # which would re-trigger it via GH_PAT (feedback loop). Driven by
  # pull_request + workflow_run. All-zero reports are suppressed before issue
  # creation (see the create step) so routine CI churn no longer spawns
  # near-duplicate empty reports.
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review, closed]
  workflow_run:
    workflows: ["App Issue Maintenance", "Repository Health Check"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: org-health-report
  cancel-in-progress: false

jobs:
  report:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Gather org health metrics
        id: metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          REPORT=""
          TOTAL_OPEN_PRS=0
          TOTAL_OPEN_ISSUES=0
          TOTAL_STALE_PRS=0

          CUTOFF_30D=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)

          REPOS=$(cd scripts && go run ./cmd/repo-review --print-default-repos)
          if [ -z "$REPOS" ]; then
            echo "warning: could not resolve managed repo inventory"
            exit 0
          fi

          for REPO in $(echo "$REPOS" | tr ',' ' '); do
            # Open PRs
            OPEN_PRS=$(gh api "repos/jclee941/$REPO/pulls" --state open --paginate --jq 'length' 2>/dev/null || echo 0)
            TOTAL_OPEN_PRS=$((TOTAL_OPEN_PRS + OPEN_PRS))

            # Open issues (excluding PRs)
            OPEN_ISSUES=$(gh api "repos/jclee941/$REPO/issues" --state open --paginate \
              --jq '[.[] | select(.pull_request == null)] | length' 2>/dev/null || echo 0)
            TOTAL_OPEN_ISSUES=$((TOTAL_OPEN_ISSUES + OPEN_ISSUES))

            # Stale PRs (30+ days)
            STALE_PRS=$(gh api "repos/jclee941/$REPO/pulls" --state open --paginate \
              --jq "[.[] | select(.updated_at < \"$CUTOFF_30D\")] | length" 2>/dev/null || echo 0)
            TOTAL_STALE_PRS=$((TOTAL_STALE_PRS + STALE_PRS))

            # Last commit
            LAST_COMMIT=$(gh api "repos/jclee941/$REPO/commits" --jq '.[0].commit.committer.date' 2>/dev/null || echo "N/A")

            REPORT="${REPORT}| $REPO | $OPEN_PRS | $OPEN_ISSUES | $STALE_PRS | $LAST_COMMIT |\n"
          done

          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "total_open_prs=$TOTAL_OPEN_PRS"
            echo "total_open_issues=$TOTAL_OPEN_ISSUES"
            echo "total_stale_prs=$TOTAL_STALE_PRS"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update health report issue
        env:
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          REPORT: ${{ steps.metrics.outputs.report }}
          TOTAL_OPEN_PRS: ${{ steps.metrics.outputs.total_open_prs }}
          TOTAL_OPEN_ISSUES: ${{ steps.metrics.outputs.total_open_issues }}
          TOTAL_STALE_PRS: ${{ steps.metrics.outputs.total_stale_prs }}
        run: |
          set -eu
          if [ -z "${ISSUE_COMMANDS_TOKEN:-}" ]; then
            echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot issue command."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          TITLE="[org-health] Weekly Organization Health Report - $DATE"
          BODY=$(printf '%s\n' "## Organization Health Report ($DATE)" '' '### Summary' "- **Total Open PRs**: $TOTAL_OPEN_PRS" "- **Total Open Issues**: $TOTAL_OPEN_ISSUES" "- **Stale PRs (30+ days)**: $TOTAL_STALE_PRS" '' '### Per-Repository Breakdown' '' '| Repo | Open PRs | Open Issues | Stale PRs | Last Commit |' '|------|----------|-------------|-----------|-------------|' "$REPORT" '' '### Action Items' '- Review stale PRs and close or update them' '- Triage open issues' '- Address repositories with old last commit dates' '' '_jclee-bot에의해자동화됨._')
          CLOSE_COMMENT="Superseded by new weekly report."$'\n\n''_jclee-bot에의해자동화됨._'

          if [ "${TOTAL_OPEN_PRS:-0}" -eq 0 ] && [ "${TOTAL_OPEN_ISSUES:-0}" -eq 0 ] && [ "${TOTAL_STALE_PRS:-0}" -eq 0 ]; then
            payload="$(jq -cn \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg comment "$CLOSE_COMMENT" \
              '{repository: $repo, commands: [{type: "close_matching_issues", title_contains: "[org-health] Weekly Organization Health Report", labels: ["org-health"], comment: $comment}]}')"
            curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
              -X POST "https://bot.jclee.me/api/v1/issue_commands" \
              -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              | jq -e '.actions | type == "array"' >/dev/null
            echo "All metrics zero — no actionable items; skipping issue creation."
            exit 0
          fi

          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg comment "$CLOSE_COMMENT" \
            '{repository: $repo, commands: [{type: "close_matching_issues", title_contains: "[org-health] Weekly Organization Health Report", labels: ["org-health"], comment: $comment}, {type: "create_issue", title: $title, body: $body, labels: ["org-health", "automation"]}]}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
            -X POST "https://bot.jclee.me/api/v1/issue_commands" \
            -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '.actions | type == "array"' >/dev/null
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
