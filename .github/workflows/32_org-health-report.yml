name: Organization Health Report

on:
  schedule:
    - cron: '15 9 * * 1'  # Weekly Monday 09:15 UTC (18:15 KST) - offset to avoid collision with 08_scorecard + 33_drift-detector
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: org-health-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Gather org health metrics
        id: metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          REPORT=""
          TOTAL_OPEN_PRS=0
          TOTAL_OPEN_ISSUES=0
          TOTAL_STALE_PRS=0

          CUTOFF_30D=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)

          REPOS=$(gh api orgs/jclee941/repos --paginate --jq '.[] | select(.archived == false) | .name' 2>/dev/null | sort)
          if [ -z "$REPOS" ]; then
            echo "warning: could not fetch repo list from org"
            exit 0
          fi

          for REPO in $REPOS; do
            # Open PRs
            OPEN_PRS=$(gh api "repos/jclee941/$REPO/pulls" --state open --paginate --jq 'length' 2>/dev/null || echo 0)
            TOTAL_OPEN_PRS=$((TOTAL_OPEN_PRS + OPEN_PRS))

            # Open issues (excluding PRs)
            OPEN_ISSUES=$(gh api "repos/jclee941/$REPO/issues" --state open --paginate \
              --jq '[.[] | select(.pull_request == null)] | length' 2>/dev/null || echo 0)
            TOTAL_OPEN_ISSUES=$((TOTAL_OPEN_ISSUES + OPEN_ISSUES))

            # Stale PRs (30+ days)
            STALE_PRS=$(gh api "repos/jclee941/$REPO/pulls" --state open --paginate \
              --jq "[.[] | select(.updated_at < \"$CUTOFF_30D\")] | length" 2>/dev/null || echo 0)
            TOTAL_STALE_PRS=$((TOTAL_STALE_PRS + STALE_PRS))

            # Last commit
            LAST_COMMIT=$(gh api "repos/jclee941/$REPO/commits" --jq '.[0].commit.committer.date' 2>/dev/null || echo "N/A")

            REPORT="${REPORT}| $REPO | $OPEN_PRS | $OPEN_ISSUES | $STALE_PRS | $LAST_COMMIT |\n"
          done

          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "total_open_prs=$TOTAL_OPEN_PRS"
            echo "total_open_issues=$TOTAL_OPEN_ISSUES"
            echo "total_stale_prs=$TOTAL_STALE_PRS"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update health report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ steps.metrics.outputs.report }}
          TOTAL_OPEN_PRS: ${{ steps.metrics.outputs.total_open_prs }}
          TOTAL_OPEN_ISSUES: ${{ steps.metrics.outputs.total_open_issues }}
          TOTAL_STALE_PRS: ${{ steps.metrics.outputs.total_stale_prs }}
        run: |
          set -eu
          DATE=$(date -u +%Y-%m-%d)
          TITLE="[org-health] Weekly Organization Health Report - $DATE"
          BODY=$(printf '%s\n' "## Organization Health Report ($DATE)" '' '### Summary' "- **Total Open PRs**: $TOTAL_OPEN_PRS" "- **Total Open Issues**: $TOTAL_OPEN_ISSUES" "- **Stale PRs (30+ days)**: $TOTAL_STALE_PRS" '' '### Per-Repository Breakdown' '' '| Repo | Open PRs | Open Issues | Stale PRs | Last Commit |' '|------|----------|-------------|-----------|-------------|' "$REPORT" '' '### Action Items' '- Review stale PRs and close or update them' '- Triage open issues' '- Address repositories with old last commit dates' '' '_Auto-generated by org-health-report workflow._')

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "org-health" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --repo "$GITHUB_REPOSITORY" --comment "Superseded by new weekly report." \
              || echo "::warning::failed to close superseded org-health issue #$EXISTING"
          fi

          gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY" --label "org-health,automation"
          echo "Created org health report issue"
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
