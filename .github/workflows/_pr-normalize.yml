name: _PR Normalize

# Reusable workflow called by downstream repos' pr-normalize.yml.
# Normalizes PR metadata: ensures title follows Conventional Commits,
# adds type labels, and syncs the PR description template.

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  normalize:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 2
    steps:
      - name: Normalize PR title and labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const title = pr.title;
            const body = pr.body || '';

            // Conventional Commits prefix check
            const ccRegex = /^(feat|fix|docs|style|refactor|test|chore|ci|build|perf)(\(.+\))?!?:\s./;
            const isConventional = ccRegex.test(title);

            // Auto-label based on prefix
            let label = null;
            const match = title.match(/^(feat|fix|docs|style|refactor|test|chore|ci|build|perf)/);
            if (match) {
              const labelMap = {
                feat: 'enhancement',
                fix: 'bug',
                docs: 'documentation',
                refactor: 'refactoring',
                test: 'testing',
                chore: 'chore',
                ci: 'ci',
                build: 'build',
                perf: 'performance',
                style: 'style'
              };
              label = labelMap[match[1]];
            }

            // Add label if found and not already present
            if (label) {
              const currentLabels = pr.labels.map(l => l.name);
              if (!currentLabels.includes(label)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: [label]
                });
              }
            }

            console.log(`PR #${pr.number}: title="${title}", conventional=${isConventional}, label=${label}`);
