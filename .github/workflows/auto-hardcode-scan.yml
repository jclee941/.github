name: Auto Hardcode Scan
on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan for hardcoded values
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import subprocess
          from pathlib import Path

          # Regex patterns matching pr_hardcode_detector.py
          HARDCODE_PATTERNS = {
              "api_key": re.compile(r'(?i)(api[_-]?key|apikey)\s*[:=]\s*["\'][a-z0-9]{16,}["\']'),
              "secret": re.compile(r'(?i)(secret|password|passwd|pwd|token)\s*[:=]\s*["\'][^"\']{4,}["\']'),
              "ip_address": re.compile(r'\b(?:\d{1,3}\.){3}\d{1,3}(?::\d+)?\b'),
              "url": re.compile(r'https?://[^\s"\']+(?<!\{)'),
          }

          IGNORE_DIRS = {".git", "node_modules", ".venv", "venv", "__pycache__", ".pytest_cache", ".mypy_cache"}
          # Exclude documentation/config files known to legitimately contain
          # IPs/URLs as part of homelab deployment narrative — these are not secrets.
          ALLOWLIST_PATHS = {
              "README.md", "AGENTS.md", "NOTICE", "LICENSE",
              "setup.py", "requirements.txt", ".gitleaksignore",
              ".pr_agent.toml",
              "docker-compose.github_app.yml",
              "docker-compose.github_app.yml.lxc",
          }

          findings = []
          for p in Path(".").rglob("*"):
              if not p.is_file():
                  continue
              if any(part in IGNORE_DIRS for part in p.parts):
                  continue
              if str(p) in ALLOWLIST_PATHS:
                  continue
              # Skip the workflow file itself (its regex literals are not hardcoded values).
              if str(p).startswith(".github/workflows/auto-hardcode-scan.yml"):
                  continue
              try:
                  content = p.read_text(encoding="utf-8", errors="ignore")
                  for name, pattern in HARDCODE_PATTERNS.items():
                      for m in pattern.finditer(content):
                          line_num = content[: m.start()].count("\n") + 1
                          findings.append(
                              {
                                  "file": str(p),
                                  "category": name,
                                  "line": line_num,
                                  "match": m.group(),
                              }
                          )
              except Exception:
                  pass

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if findings:
              body = "## \U0001F50D Hardcoded Values Detected (Scheduled Scan)\n\n"
              body += f"Total findings: **{len(findings)}** (showing first 50)\n\n"
              body += "| Category | File | Line | Match |\n"
              body += "|----------|------|------|-------|\n"
              for f in findings[:50]:
                  match_escaped = f['match'].replace("|", "\\|").replace("\n", " ")
                  body += f"| {f['category']} | `{f['file']}` | {f['line']} | `{match_escaped}` |\n"
              body += "\n**Action:** Either move the file to ALLOWLIST_PATHS in this workflow if it's legitimate documentation, or extract the value to an environment variable / secret."
              if summary:
                  with open(summary, "a") as fh:
                      fh.write(body)
              print(f"::warning::Hardcode scan detected {len(findings)} potential findings; see job summary.")
              print(f"Reported {len(findings)} findings via step summary.")
              # Fail the run so findings are visible in branch protection /
              # Slack-style CI dashboards rather than vanishing into a green run.
              import sys as _sys
              _sys.exit(1)
          else:
              if summary:
                  with open(summary, "a") as fh:
                      fh.write("## \u2705 Hardcode Scan: clean\n\nNo findings outside the documentation allowlist.\n")
              print("No hardcoded values detected (after allowlist).")
          PYEOF
