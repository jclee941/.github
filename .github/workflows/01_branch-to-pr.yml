name: Branch to PR

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: branch-to-pr-retired-${{ github.ref }}
  cancel-in-progress: false

jobs:
  retired:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report App ownership
        run: |
          echo "Branch-to-PR automation is owned by the jclee-bot GitHub App."
          echo "Install/deploy the App image instead of using workflow-owned PR creation."
