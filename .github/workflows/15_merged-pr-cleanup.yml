name: Merged PR Cleanup

# When a PR is merged:
#   - close any linked issues (Closes/Fixes/Resolves keyword OR
#     branch-name issue-N pattern)
#   - delete the source branch (unless it's master/release/*)
# Best-effort: missing branch / closed issue → warning, not failure.

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number
        required: true
        type: string
      dry_run:
        description: Skip actual deletes/closes
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: merged-pr-cleanup-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'closed' && github.event.pull_request.merged == true)
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Gather PR data
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -eu
          DATA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json number,headRefName,headRepository,baseRefName,body,state,title)
          STATE=$(echo "$DATA" | jq -r '.state')
          if [ "$STATE" != "MERGED" ]; then
            echo "::notice::PR #$PR_NUMBER is $STATE; skipping cleanup."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HEAD_REF=$(echo "$DATA" | jq -r '.headRefName')
          HEAD_REPO=$(echo "$DATA" | jq -r '.headRepository.name // empty')
          BASE_REF=$(echo "$DATA" | jq -r '.baseRefName')
          BODY=$(echo "$DATA" | jq -r '.body // ""')
          {
            echo "pr_number=$PR_NUMBER"
            echo "head_ref=$HEAD_REF"
            echo "head_repo=$HEAD_REPO"
            echo "base_ref=$BASE_REF"
          } >> "$GITHUB_OUTPUT"
          # Persist body to a file (multi-line, safer than $GITHUB_OUTPUT).
          printf '%s' "$BODY" > /tmp/pr_body.txt

      - name: Close linked issues
        if: steps.pr.outputs.skip != 'true'
        env:
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -eu
          # 1) Keywords in body — GitHub already auto-closes these on the
          #    *origin* repo when the PR merges to default branch, but we
          #    do an explicit pass to handle non-default-base merges.
          ISSUES=$(grep -oiE '(closes|close|closed|fixes|fix|fixed|resolves|resolve|resolved)[[:space:]]+#[0-9]+' /tmp/pr_body.txt 2>/dev/null \
            | grep -oE '#[0-9]+' | tr -d '#' | sort -u || true)
          # 2) Branch-name fallback: type/issue-N-slug
          BRANCH_ISSUE=$(echo "$HEAD_REF" | sed -nE 's|^[^/]+/issue-([0-9]+)-.*|\1|p')
          if [ -n "$BRANCH_ISSUE" ]; then
            ISSUES="$ISSUES $BRANCH_ISSUE"
          fi
          ISSUES=$(echo "$ISSUES" | tr ' ' '\n' | sort -u | grep -v '^$' || true)
          if [ -z "$ISSUES" ]; then
            echo "::notice::No linked issues found for PR #$PR_NUMBER"
            exit 0
          fi
          if [ -z "${ISSUE_COMMANDS_TOKEN:-}" ]; then
            echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot issue command."
            exit 0
          fi
          NUMBERS=$(printf '%s\n' "$ISSUES" | jq -Rsc 'split("\n") | map(select(length > 0) | tonumber)')
          COMMENT="Closed automatically by merged PR #$PR_NUMBER (branch \`$HEAD_REF\`)."$'\n\n''_jclee-bot에의해자동화됨._'
          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            --argjson dry_run "$DRY_RUN" \
            --argjson numbers "$NUMBERS" \
            --arg comment "$COMMENT" \
            '{repository: $repo, dry_run: $dry_run, commands: [{type: "close_issues", numbers: $numbers, comment: $comment}]}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
            -X POST "https://bot.jclee.me/api/v1/issue_commands" \
            -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '.actions | type == "array"' >/dev/null

      - name: Close oversized-PR advisory issues
        if: steps.pr.outputs.skip != 'true'
        env:
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -eu
          if [ -z "${ISSUE_COMMANDS_TOKEN:-}" ]; then
            echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot issue command."
            exit 0
          fi
          COMMENT="Closed automatically by merged PR #$PR_NUMBER."$'\n\n''_jclee-bot에의해자동화됨._'
          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            --argjson dry_run "$DRY_RUN" \
            --arg title "[BOT] PR #$PR_NUMBER exceeds 500 LOC" \
            --arg comment "$COMMENT" \
            '{repository: $repo, dry_run: $dry_run, commands: [{type: "close_matching_issues", title_contains: $title, comment: $comment}]}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
            -X POST "https://bot.jclee.me/api/v1/issue_commands" \
            -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '.actions | type == "array"' >/dev/null

      - name: Delete source branch
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          set -eu
          # Skip protected branches.
          case "$HEAD_REF" in
            master|develop|release|release/*)
              echo "::notice::Refusing to delete protected branch: $HEAD_REF"
              exit 0 ;;
          esac
          # Skip fork branches (head repo != base repo).
          if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" != "${GITHUB_REPOSITORY##*/}" ]; then
            echo "::notice::Branch lives on fork ($HEAD_REPO); skipping delete."
            exit 0
          fi
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY-RUN: would delete branch $HEAD_REF"
            exit 0
          fi
          # GitHub may have already auto-deleted on merge — treat 404 as success.
          if gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/$HEAD_REF" 2>/tmp/del_err; then
            echo "Deleted $HEAD_REF"
          else
            if grep -q "Reference does not exist" /tmp/del_err 2>/dev/null; then
              echo "::notice::Branch $HEAD_REF already deleted by GitHub"
            else
              echo "::warning::failed to delete branch $HEAD_REF: $(cat /tmp/del_err)"
            fi
          fi
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
