name: ELK Setup

on:
  push:
    branches: [master]
    paths:
      - 'filebeat.yml'
      - 'docker-compose.github_app.yml'
      - 'docker-compose.github_app.yml.lxc'
      - '.github/workflows/27_elk-setup.yml'
      - 'jclee_bot/native_health.py'
      - 'jclee_bot/native_health_checks.py'
  deployment:
  repository_dispatch:
    types: [elk-setup]
  workflow_dispatch:

permissions:
  contents: read
  issues: read

concurrency:
  group: elk-setup
  cancel-in-progress: false

jobs:
  elk-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Delegate ELK setup to jclee-bot
        env:
          NATIVE_HEALTH_TOKEN: ${{ secrets.NATIVE_HEALTH_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NATIVE_HEALTH_TOKEN:-}" ]; then
            echo "::error::NATIVE_HEALTH_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured"
            exit 1
          fi
          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            '{repository: $repo, checks: ["elk_setup"]}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 180 \
            -X POST "https://bot.jclee.me/api/v1/native_health" \
            -H "Authorization: Bearer ${NATIVE_HEALTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '(.checks | all(.status == "healthy")) and (.actions | type == "array")' >/dev/null
