name: ELK Setup

on:
  push:
    branches: [master]
    paths:
      - 'filebeat.yml'
      - 'docker-compose.github_app.yml'
      - 'docker-compose.github_app.yml.lxc'
      - '.github/workflows/27_elk-setup.yml'
  deployment:
  repository_dispatch:
    types: [elk-setup]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: elk-setup
  cancel-in-progress: false

jobs:
  elk-setup:
    # Homelab-only: requires access to internal Elasticsearch (host in ELK_HOST secret)
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup index template
        env:
          ELK_HOST: ${{ secrets.ELK_HOST }}
          ELK_USERNAME: ${{ secrets.ELK_USERNAME }}
          ELK_PASSWORD: ${{ secrets.ELK_PASSWORD }}
        run: |
          set -eu
          echo "Setting up github-bot-logs index template..."
          curl -sS -X PUT -u "${ELK_USERNAME}:${ELK_PASSWORD}" "http://${ELK_HOST}/_index_template/github-bot-logs" \
            -H 'Content-Type: application/json' \
            -d '{
              "index_patterns": ["github-bot-logs-*"],
              "template": {
                "settings": {
                  "number_of_shards": 1,
                  "number_of_replicas": 0,
                  "refresh_interval": "5s",
                  "index.lifecycle.name": "github-bot-logs",
                  "index.lifecycle.rollover_alias": "github-bot-logs"
                },
                "mappings": {
                  "dynamic_templates": [
                    {
                      "strings_as_keywords": {
                        "match_mapping_type": "string",
                        "mapping": {
                          "type": "keyword",
                          "ignore_above": 1024
                        }
                      }
                    }
                  ]
                }
              },
              "priority": 500,
              "version": 1,
              "_meta": {
                "description": "GitHub bot logs index template"
              }
            }' || echo "Warning: Could not create index template (Elasticsearch may be unreachable)"

      - name: Setup ILM policy
        env:
          ELK_HOST: ${{ secrets.ELK_HOST }}
          ELK_USERNAME: ${{ secrets.ELK_USERNAME }}
          ELK_PASSWORD: ${{ secrets.ELK_PASSWORD }}
        run: |
          set -eu
          echo "Setting up github-bot-logs ILM policy..."
          curl -sS -X PUT -u "${ELK_USERNAME}:${ELK_PASSWORD}" "http://${ELK_HOST}/_ilm/policy/github-bot-logs" \
            -H 'Content-Type: application/json' \
            -d '{
              "policy": {
                "phases": {
                  "hot": {
                    "min_age": "0ms",
                    "actions": {
                      "rollover": {
                        "max_primary_shard_size": "10gb",
                        "max_age": "7d",
                        "max_docs": 10000000
                      }
                    }
                  },
                  "warm": {
                    "min_age": "7d",
                    "actions": {
                      "shrink": {
                        "number_of_shards": 1
                      },
                      "forcemerge": {
                        "max_num_segments": 1
                      }
                    }
                  },
                  "delete": {
                    "min_age": "30d",
                    "actions": {
                      "delete": {}
                    }
                  }
                }
              }
            }' || echo "Warning: Could not create ILM policy (Elasticsearch may be unreachable)"

      - name: Validate Filebeat config
        run: |
          echo "Validating filebeat.yml..."
          # Filebeat has a test config command, but we don't have filebeat installed
          # Instead, do basic YAML validation
          python3 -c "import yaml; yaml.safe_load(open('filebeat.yml'))"
          echo "✅ filebeat.yml is valid YAML"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          title: 'ELK Setup Failed'
          labels: 'elk-health,automated'
