name: Pages Deploy

# Publishes the docs/ tree (architecture + downstream standardization audit) as a
# GitHub Pages site. Managed by jclee-bot.

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/41_pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'

      - name: Build HTML site from docs
        run: |
          set -euo pipefail
          python3 -m pip install --quiet 'markdown>=3.6'
          python3 .github/scripts/build_pages.py
          echo "=== site contents ==="
          ls -la _site

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
