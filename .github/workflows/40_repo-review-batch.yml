name: Repo Review Batch

# Whole-repo automated review across the protected managed-repo inventory
# from config/repos.yaml. Each repo is cloned to /tmp,
# pr-agent's LocalGitProvider produces a review.md against a base
# branch (root commit for tiny repos; HEAD~N for large), and the
# resulting markdown is filed as a GitHub issue on the target repo
# (or appended to an existing open [bot-review] issue).
#
# Manual dispatch only — never on push/cron, to keep token spend
# explicit.

on:
  workflow_dispatch:
    inputs:
      repos:
        description: Comma-separated repo names (no owner)
        required: false
        default: ""
      dry_run:
        description: If true, no issues are created/commented
        required: false
        type: boolean
        default: true
      since_commits:
        description: Commits back from HEAD to use as review base
        required: false
        default: "50"
      diff_size_limit:
        description: Max diff char count before skipping a repo
        required: false
        default: "150000"
      model:
        description: Primary LLM model
        required: false
        default: gpt-5.5

permissions:
  contents: read
  issues: write

concurrency:
  group: repo-review-batch
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 120
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout local actions
        uses: actions/checkout@v6
        with:
          repository: jclee941/.github
          ref: master
          fetch-depth: 1
      - name: Checkout jclee941/.github
        uses: actions/checkout@v6
        with:
          repository: jclee941/.github
          ref: master
          path: pr-agent-src
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-repo-review-${{ hashFiles('pr-agent-src/pyproject.toml', 'pr-agent-src/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-repo-review-

      - name: Install pr-agent
        working-directory: pr-agent-src
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'


      - name: Verify CLIProxyAPI connectivity
        env:
          CLIPROXY_API_KEY: ${{ secrets.CLIPROXY_API_KEY }}
        run: |
          set -e
          if [ -z "$CLIPROXY_API_KEY" ]; then
            echo "::error::CLIPROXY_API_KEY secret is not set on this repo."
            exit 1
          fi
          HTTP_CODE=$(curl -sS -o /tmp/cliproxy_test.json -w '%{http_code}' \
            --max-time 15 \
            https://cliproxy.jclee.me/v1/models \
            -H "Authorization: Bearer $CLIPROXY_API_KEY")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::CLIProxyAPI returned HTTP $HTTP_CODE"
            cat /tmp/cliproxy_test.json
            exit 1
          fi
          echo "CLIProxyAPI OK"

      - name: Resolve repository inventory
        id: repo_inventory
        working-directory: pr-agent-src
        env:
          INPUT_REPOS: ${{ inputs.repos }}
        run: |
          set -eu
          if [ -n "$INPUT_REPOS" ]; then
            repos=$(cd scripts && go run ./cmd/repo-review --normalize-repos --repos "$INPUT_REPOS")
          else
            repos=$(cd scripts && go run ./cmd/repo-review --print-default-repos)
          fi
          if [ -z "$repos" ]; then
            echo "::error::resolved repo inventory is empty"
            exit 1
          fi
          echo "repos=$repos" >> "$GITHUB_OUTPUT"
          echo "Resolved repo inventory: $repos"

      - name: Close stale bot-review issues
        if: inputs.dry_run != true
        env:
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          REPOS: ${{ steps.repo_inventory.outputs.repos }}
        run: |
          set -eu
          if [ -z "${ISSUE_COMMANDS_TOKEN:-}" ]; then
            echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot stale issue close."
            exit 0
          fi
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)
          for repo in $(echo "$REPOS" | tr ',' ' '); do
            COMMENT='Closed automatically: bot-review issue older than 30 days. New review will create a fresh issue if needed.'$'\n\n''_jclee-bot에의해자동화됨._'
            payload="$(jq -cn \
              --arg repo "jclee941/$repo" \
              --arg cutoff "$CUTOFF" \
              --arg comment "$COMMENT" \
              '{repository: $repo, commands: [{type: "close_matching_issues", labels: ["bot-review"], created_before: $cutoff, comment: $comment}]}')"
            curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
              -X POST "https://bot.jclee.me/api/v1/issue_commands" \
              -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$payload" \
              | jq -e '.actions | type == "array"' >/dev/null
          done

      - name: Run repo-review batch
        working-directory: pr-agent-src
        env:
          # GH_PAT is a fine-grained PAT with Issues:write on every target
          # repo. Falls back to GITHUB_TOKEN (which can't cross repos).
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          PR_AGENT_PYTHON: ${{ github.workspace }}/pr-agent-src/.venv/bin/python
          # Explicit path to repo_review.py so the Go tool does not depend on
          # os.Args[0] (a /tmp/go-build path under `go run`).
          REPO_REVIEW_SCRIPT: ${{ github.workspace }}/pr-agent-src/scripts/repo_review.py
          # pr-agent settings (mirrors pr-review.yml)
          OPENAI.KEY: ${{ secrets.CLIPROXY_API_KEY }}
          OPENAI.API_BASE: https://cliproxy.jclee.me/v1
          CONFIG.MODEL: ${{ inputs.model }}
          CONFIG.FALLBACK_MODELS: '["minimax-m3"]'
          CONFIG.RESPONSE_LANGUAGE: ko
          CONFIG.AI_TIMEOUT: "180"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "128000"
          LITELLM_LOCAL_MODEL_COST_MAP: "true"
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_SINCE_COMMITS: ${{ inputs.since_commits }}
          INPUT_DIFF_SIZE_LIMIT: ${{ inputs.diff_size_limit }}
          INPUT_MODEL: ${{ inputs.model }}
          REPOS: ${{ steps.repo_inventory.outputs.repos }}
        run: |
          set -eu
          DRY=""
          if [ "$INPUT_DRY_RUN" = "true" ]; then DRY="--dry-run"; fi
          cd scripts && go run ./cmd/repo-review \
            --repos="$REPOS" \
            --since-commits="$INPUT_SINCE_COMMITS" \
            --diff-size-limit="$INPUT_DIFF_SIZE_LIMIT" \
            --model="$INPUT_MODEL" \
            $DRY

      - name: Summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          REPOS: ${{ steps.repo_inventory.outputs.repos }}
        run: |
          set -eu
          {
            echo "## Repo Review Batch Summary"
            echo ""
            echo "| Repo | Open bot-review issue |"
            echo "|------|----------------------|"
            for repo in $(echo "$REPOS" | tr ',' ' '); do
              issue=$(gh issue list --repo "jclee941/$repo" --state open --label bot-review --limit 1 --json number,url --jq '.[0] | "#\(.number) (\(.url))"' 2>/dev/null || echo "?")
              echo "| $repo | ${issue:-none} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
