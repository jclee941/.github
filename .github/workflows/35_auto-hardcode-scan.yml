name: Auto Hardcode Scan
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: ["Sanity"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: auto-hardcode-scan
  cancel-in-progress: false

jobs:
  scan:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan for hardcoded values
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          python3 << 'PYEOF'
          import os
          import re
          import subprocess
          from pathlib import Path

          # Regex patterns matching pr_hardcode_detector.py.
          # Categorized so the noisy IP/URL detectors can use a documentation
          # allowlist while the high-signal api_key/secret detectors run
          # everywhere with no allowlist — a real key in any committed file
          # MUST fail the scan.
          HIGH_SIGNAL_PATTERNS = {
              # Require the right-hand side to be a non-trivial literal:
              # NOT a `${VAR}` env-var reference, NOT a `<placeholder>` doc,
              # NOT an `{interpolation}` token — only an actual baked-in literal.
              "api_key": re.compile(
                  r'(?i)(api[_-]?key|apikey)\s*[:=]\s*["\']'
                  r'(?![${<{])'
                  r'[a-z0-9_\-]{16,}["\']'
              ),
              "secret": re.compile(
                  r'(?i)(secret|password|passwd|pwd|token)\s*[:=]\s*["\']'
                  r'(?![${<{])'
                  # Exclude quoted sentinel/boolean literals (feature flags,
                  # not secrets) like "false"/"true"/"null"; require >=8 chars.
                  r'(?!(?:true|false|null|none|yes|no|0|1)["\'])'
                  r'[^"\']{8,}["\']'
              ),
          }
          NOISY_PATTERNS = {
              "ip_address": re.compile(r'\b(?:\d{1,3}\.){3}\d{1,3}(?::\d+)?\b'),
              "url": re.compile(r'https?://[^\s"\']+(?<!\{)'),
          }

          IGNORE_DIRS = {
              ".git", "node_modules", ".venv", "venv", "__pycache__",
              ".pytest_cache", ".mypy_cache", ".ruff_cache",
              "pr_agent.egg-info",
          }
          # Files where IP/URL literals are legitimate documentation /
          # configuration narrative, NOT secrets. high-signal patterns still
          # run against these.
          NOISY_ALLOWLIST_PATHS = {
              "README.md", "AGENTS.md", "NOTICE", "LICENSE",
              "setup.py", "requirements.txt", "requirements-dev.txt",
              ".gitleaksignore", ".pr_agent.toml", ".env.example",
              "docker-compose.github_app.yml",
              "docker-compose.github_app.yml.lxc",
              "Dockerfile.github_app", "Dockerfile.github_action",
              "pyproject.toml", "MANIFEST.in", "CONTRIBUTING.md",
              # legitimate public URLs (docs/config/templates), not secrets
              ".ls-lint.yml", "CODE_OF_CONDUCT.md", "config/repos.yaml",
              "templates/README.md", "templates/CONTRIBUTING.md",
          }
          NOISY_ALLOWLIST_PREFIXES = (
              # upstream fork source — audited at fork time, not rewritten
              "pr_agent/",
              # upstream-style fixture/doc trees
              "docs/", "tests/",
              # workflow files contain regex literals matching the patterns themselves
              ".github/",
              # deployment scripts: legitimate hardcoded homelab references
              "scripts/", "github_action/",
              # fork-owned App code: legitimate bind address (0.0.0.0) and the
              # public GitHub API base URL; high-signal secret detectors still run.
              "jclee_bot/",
          )

          findings = []
          # Scan only git-tracked files: this is the committed-secret universe
          # (gitignored debris like .env / .omo/ / .sisyphus/ is NOT PR risk and
          # only creates noise). Fail closed if git is unavailable.
          try:
              tracked = subprocess.run(
                  ["git", "ls-files", "-z"],
                  check=True, capture_output=True,
              ).stdout.split(b"\0")
          except (subprocess.CalledProcessError, FileNotFoundError) as e:
              raise SystemExit(f"hardcode-scan: 'git ls-files' failed: {e}")
          for raw in tracked:
              if not raw:
                  continue
              p = Path(os.fsdecode(raw))
              if not p.is_file():
                  continue
              path_str = str(p)
              try:
                  content = p.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue

              # 1) High-signal: scan EVERYWHERE except test fixture files,
              # which legitimately embed throwaway placeholder tokens like
              # 'token="token_v1"' as part of mock state.
              # The auto-hardcode-scan workflow itself contains regex literals
              # and inline doc-comment examples that match the patterns; skip it.
              if not (path_str.startswith("tests/") or path_str == ".github/workflows/35_auto-hardcode-scan.yml"):
                  for name, pattern in HIGH_SIGNAL_PATTERNS.items():
                      for m in pattern.finditer(content):
                          line_num = content[: m.start()].count("\n") + 1
                          findings.append(
                              {
                                  "file": path_str,
                                  "category": name,
                                  "line": line_num,
                                  "match": m.group(),
                              }
                          )

              # 2) Noisy IP/URL: skip if the file is on the documentation
              # allowlist or under an allowlisted prefix.
              if path_str in NOISY_ALLOWLIST_PATHS:
                  continue
              if path_str.startswith(NOISY_ALLOWLIST_PREFIXES):
                  continue
              for name, pattern in NOISY_PATTERNS.items():
                  for m in pattern.finditer(content):
                      line_num = content[: m.start()].count("\n") + 1
                      findings.append(
                          {
                              "file": path_str,
                              "category": name,
                              "line": line_num,
                              "match": m.group(),
                          }
                      )

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if findings:
              body = "## \U0001F50D Hardcoded Values Detected (Scheduled Scan)\n\n"
              body += f"Total findings: **{len(findings)}** (showing first 50)\n\n"
              body += "| Category | File | Line | Match |\n"
              body += "|----------|------|------|-------|\n"
              for f in findings[:50]:
                  match_escaped = f['match'].replace("|", "\\|").replace("\n", " ")
                  body += f"| {f['category']} | `{f['file']}` | {f['line']} | `{match_escaped}` |\n"
              body += "\n**Action:** Either move the file to ALLOWLIST_PATHS in this workflow if it's legitimate documentation, or extract the value to an environment variable / secret."
              if summary:
                  with open(summary, "a") as fh:
                      fh.write(body)
              print(f"::warning::Hardcode scan detected {len(findings)} potential findings; see job summary.")
              print(f"Reported {len(findings)} findings via step summary.")
              # Fail the run so findings are visible in branch protection /
              # Slack-style CI dashboards rather than vanishing into a green run.
              import sys as _sys
              _sys.exit(1)
          else:
              if summary:
                  with open(summary, "a") as fh:
                      fh.write("## \u2705 Hardcode Scan: clean\n\nNo findings outside the documentation allowlist.\n")
              print("No hardcoded values detected (after allowlist).")
          PYEOF
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
