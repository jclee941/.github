name: Reusable CI (Lint + Test + Build)

# Auto-detects project language and runs the standard lint/test/build pipeline.
# Skips steps gracefully when no matching package manifest is found, so the
# workflow stays green for docs/config-only repos.

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      python-version:
        type: string
        default: "3.12"
      go-version:
        type: string
        default: "1.22"
      working-directory:
        type: string
        default: "."
      run-build:
        type: boolean
        default: true
      run-tests:
        type: boolean
        default: true
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  detect:
    name: Detect Project Type
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.d.outputs.has-node }}
      has-python: ${{ steps.d.outputs.has-python }}
      has-go: ${{ steps.d.outputs.has-go }}
      has-terraform: ${{ steps.d.outputs.has-terraform }}
      pkg-manager: ${{ steps.d.outputs.pkg-manager }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        working-directory: ${{ inputs.working-directory }}
        run: |
          set -e
          has_node=false; has_py=false; has_go=false; has_tf=false; pm=npm
          [ -f package.json ] && has_node=true
          { [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ]; } && has_py=true
          [ -f go.mod ] && has_go=true
          ls *.tf >/dev/null 2>&1 && has_tf=true
          if [ -f pnpm-lock.yaml ]; then pm=pnpm
          elif [ -f yarn.lock ]; then pm=yarn
          elif [ -f bun.lockb ] || [ -f bun.lock ]; then pm=bun
          fi
          {
            echo "has-node=$has_node"
            echo "has-python=$has_py"
            echo "has-go=$has_go"
            echo "has-terraform=$has_tf"
            echo "pkg-manager=$pm"
          } >> "$GITHUB_OUTPUT"

  node:
    name: Node
    needs: detect
    if: needs.detect.outputs.has-node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ needs.detect.outputs.pkg-manager == 'pnpm' && 'pnpm' || (needs.detect.outputs.pkg-manager == 'yarn' && 'yarn' || 'npm') }}
      - if: needs.detect.outputs.pkg-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - if: needs.detect.outputs.pkg-manager == 'bun'
        uses: oven-sh/setup-bun@v2
      - name: Install
        continue-on-error: true
        run: |
          case "${{ needs.detect.outputs.pkg-manager }}" in
            pnpm) pnpm install --frozen-lockfile || pnpm install ;;
            yarn) yarn install --frozen-lockfile || yarn install ;;
            bun)  bun install ;;
            *)    npm ci --prefer-offline --no-audit --no-fund || npm install ;;
          esac
      - name: Lint
        continue-on-error: true
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint?0:1)"; then
            ${{ needs.detect.outputs.pkg-manager }} run lint
          else
            echo "::notice::no lint script; skipping"
          fi
      - name: Typecheck
        continue-on-error: true
        run: |
          if node -e "process.exit(require('./package.json').scripts?.typecheck?0:1)"; then
            ${{ needs.detect.outputs.pkg-manager }} run typecheck
          elif node -e "process.exit(require('./package.json').scripts?.['type-check']?0:1)"; then
            ${{ needs.detect.outputs.pkg-manager }} run type-check
          else
            echo "::notice::no typecheck script; skipping"
          fi
      - name: Test
        if: ${{ inputs.run-tests }}
        continue-on-error: true
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test?0:1)"; then
            ${{ needs.detect.outputs.pkg-manager }} test --if-present || ${{ needs.detect.outputs.pkg-manager }} run test
          else
            echo "::notice::no test script; skipping"
          fi
      - name: Build
        if: ${{ inputs.run-build }}
        continue-on-error: true
        run: |
          if node -e "process.exit(require('./package.json').scripts?.build?0:1)"; then
            ${{ needs.detect.outputs.pkg-manager }} run build
          else
            echo "::notice::no build script; skipping"
          fi

  python:
    name: Python
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true
          fi
          [ -f requirements.txt ] && pip install -r requirements.txt
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt
          pip install ruff pytest 2>/dev/null || true
      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check . || echo "::warning::ruff issues found"
      - name: Test (pytest)
        if: ${{ inputs.run-tests }}
        continue-on-error: true
        run: |
          if [ -d tests ] || [ -d test ] || compgen -G "test_*.py" >/dev/null || compgen -G "*_test.py" >/dev/null; then
            pytest -q || true
          else
            echo "::notice::no tests found; skipping"
          fi

  go:
    name: Go
    needs: detect
    if: needs.detect.outputs.has-go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - name: Vet
        continue-on-error: true
        run: go vet ./...
      - name: Test
        if: ${{ inputs.run-tests }}
        continue-on-error: true
        run: go test ./... -count=1
      - name: Build
        if: ${{ inputs.run-build }}
        continue-on-error: true
        run: go build ./...

  terraform:
    name: Terraform
    needs: detect
    if: needs.detect.outputs.has-terraform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt
        continue-on-error: true
        run: terraform fmt -check -recursive
      - name: init
        continue-on-error: true
        run: terraform init -backend=false
      - name: validate
        continue-on-error: true
        run: terraform validate
