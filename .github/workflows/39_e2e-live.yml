name: Live E2E Tests

# Runs the live E2E test suite against real GitHub repos.
# Read-only fleet health checks run on workflow_run (after Build/Runtime/Bot Health).
# Canary mutation tests require workflow_dispatch because they mutate repositories.
#
# Required secrets:
#   - E2E_GITHUB_TOKEN (or GH_TOKEN): GitHub PAT with repo access
#   - E2E_CLIPROXY_API_KEY (or CLIPROXY_API_KEY): CLIProxyAPI key for optional health tests

on:
  workflow_run:
    workflows: ["Build and Push App Image", "Runtime Health Check", "Bot Health Monitor"]
    types: [completed]
  repository_dispatch:
    types: [e2e-live-readonly, e2e-live-canary]
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: e2e-live-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  readonly:
    name: Read-Only Fleet Health
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-e2e-${{ hashFiles('pyproject.toml', 'requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run read-only fleet health checks
        env:
          E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN || secrets.GH_TOKEN }}
        run: |
          pytest tests/e2e_live/test_fleet_health.py tests/e2e_live/test_go_cli.py tests/e2e_live/test_cliproxy_health.py tests/e2e_live/test_app_health.py -v --tb=short --junitxml=readonly-pytest-report.xml

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: readonly-health-report
          path: |
            readonly-pytest-report.xml

  canary:
    name: Private Canary + Privileged Workflow Guards
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 20
    needs: readonly
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'repository_dispatch' && github.event.action == 'e2e-live-canary')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-e2e-${{ hashFiles('pyproject.toml', 'requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest requests

      - name: Run canary mutation tests
        env:
          E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN || secrets.GH_TOKEN }}
          E2E_CLIPROXY_API_KEY: ${{ secrets.E2E_CLIPROXY_API_KEY || secrets.CLIPROXY_API_KEY }}
        run: |
          pytest tests/e2e_live/test_security_review.py tests/e2e_live/test_private_canary.py -v --tb=short --junitxml=canary-pytest-report.xml

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: canary-mutation-report
          path: |
            canary-pytest-report.xml
