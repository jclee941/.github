name: _PR Size

# Reusable workflow: label PRs by size (XS/S/M/L/XL).
# Called by downstream repos' pr-size.yml.

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate PR size and label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const total = additions + deletions;
            let size = 'XL';
            if (total < 10) size = 'XS';
            else if (total < 50) size = 'S';
            else if (total < 100) size = 'M';
            else if (total < 500) size = 'L';
            const label = `size/${size}`;
            const currentLabels = pr.labels.map(l => l.name);
            const sizeLabels = currentLabels.filter(l => l.startsWith('size/'));
            // Remove old size labels
            for (const oldLabel of sizeLabels) {
              if (oldLabel !== label) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: oldLabel
                });
              }
            }
            // Add new size label if not present
            if (!currentLabels.includes(label)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [label]
              });
            }
            console.log(`PR #${pr.number}: ${additions}+/${deletions}- = ${label}`);
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 ${{ github.workflow }} failed: ${context.runId}`,
              body: `${{ github.workflow }} workflow failed. See [run logs](${context.payload.repository.html_url}/actions/runs/${context.runId}).`
              });
            } catch (e) {
              core.warning(`Could not create issue: ${e.message}`);
            }