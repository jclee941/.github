name: Runtime Health Check

on:
  deployment_status:
  workflow_run:
    workflows: ["Build and Push App Image"]
    types: [completed]
  repository_dispatch:
    types: [runtime-health-check]
  workflow_dispatch:
permissions:
  contents: read
  issues: write

concurrency:
  group: runtime-health-check
  cancel-in-progress: false

env:
  HEALTH_ISSUE_REPO: ${{ github.repository }}

jobs:
  app_endpoint:
    name: GitHub App webhook endpoint
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 3
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check bot webhook endpoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: 🚨 Bot webhook endpoint unreachable
          ENDPOINT: https://bot.jclee.me/api/v1/github_webhooks
        run: |
          set -euo pipefail

          upsert_issue() {
            local body="$1"
            local issue_number
            issue_number=$(TITLE="$ISSUE_TITLE" gh issue list \
              --repo "$HEALTH_ISSUE_REPO" \
              --state open \
              --search "$ISSUE_TITLE in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
              | head -n 1 || true)

            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --repo "$HEALTH_ISSUE_REPO" --body "$body"
            else
              gh issue create --repo "$HEALTH_ISSUE_REPO" --title "$ISSUE_TITLE" --body "$body"
            fi
          }

          http_code=$(curl -sS -I -o /tmp/app_endpoint_headers.txt -w "%{http_code}" --max-time 10 "$ENDPOINT" || true)
          case "$http_code" in
            200|401|403|404|405)
              echo "Webhook endpoint responded with HTTP $http_code"
              ;;
            *)
              body=$(printf "%s\n\n- Endpoint: %s\n- Expected status: 200, 401, 403, 404, or 405\n- Actual status: %s\n- Timeout: 10s\n- Workflow run: %s/%s/actions/runs/%s\n- Checked at: %s\n" \
                "Runtime health check failed for the GitHub App webhook endpoint." \
                "$ENDPOINT" \
                "${http_code:-no response}" \
                "$GITHUB_SERVER_URL" \
                "$GITHUB_REPOSITORY" \
                "$GITHUB_RUN_ID" \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")")
              upsert_issue "$body"
              exit 1
              ;;
          esac

  cliproxy_health:
    name: CLIProxyAPI unauthenticated health
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 3
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check CLIProxyAPI models endpoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: 🚨 CLIProxyAPI unreachable
          ENDPOINT: https://cliproxy.jclee.me/v1/models
        run: |
          set -euo pipefail

          upsert_issue() {
            local body="$1"
            local issue_number
            issue_number=$(TITLE="$ISSUE_TITLE" gh issue list \
              --repo "$HEALTH_ISSUE_REPO" \
              --state open \
              --search "$ISSUE_TITLE in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
              | head -n 1 || true)

            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --repo "$HEALTH_ISSUE_REPO" --body "$body"
            else
              gh issue create --repo "$HEALTH_ISSUE_REPO" --title "$ISSUE_TITLE" --body "$body"
            fi
          }

          http_code=$(curl -sS -o /tmp/cliproxy_health.json -w "%{http_code}" --max-time 10 "$ENDPOINT" || true)
          if [ "$http_code" = "401" ]; then
            echo "CLIProxyAPI responded with expected HTTP 401"
          else
            body=$(printf "%s\n\n- Endpoint: %s\n- Expected status: 401 without auth\n- Actual status: %s\n- Timeout: 10s\n- Workflow run: %s/%s/actions/runs/%s\n- Checked at: %s\n" \
              "Runtime health check failed for CLIProxyAPI." \
              "$ENDPOINT" \
              "${http_code:-no response}" \
              "$GITHUB_SERVER_URL" \
              "$GITHUB_REPOSITORY" \
              "$GITHUB_RUN_ID" \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")")
            upsert_issue "$body"
            exit 1
          fi
