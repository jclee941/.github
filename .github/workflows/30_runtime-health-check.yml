name: Runtime Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  issues: write

concurrency:
  group: runtime-health-check
  cancel-in-progress: false

env:
  HEALTH_ISSUE_REPO: ${{ github.repository }}

jobs:
  app_endpoint:
    name: GitHub App webhook endpoint
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 3
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check bot webhook endpoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: 🚨 Bot webhook endpoint unreachable
          ENDPOINT: https://bot.jclee.me/api/v1/github_webhooks
        run: |
          set -euo pipefail

          upsert_issue() {
            local body="$1"
            local issue_number
            issue_number=$(TITLE="$ISSUE_TITLE" gh issue list \
              --repo "$HEALTH_ISSUE_REPO" \
              --state open \
              --search "$ISSUE_TITLE in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
              | head -n 1 || true)

            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --repo "$HEALTH_ISSUE_REPO" --body "$body"
            else
              gh issue create --repo "$HEALTH_ISSUE_REPO" --title "$ISSUE_TITLE" --body "$body"
            fi
          }

          http_code=$(curl -sS -I -o /tmp/app_endpoint_headers.txt -w "%{http_code}" --max-time 10 "$ENDPOINT" || true)
          case "$http_code" in
            200|401|403|404|405)
              echo "Webhook endpoint responded with HTTP $http_code"
              ;;
            *)
              body=$(printf "%s\n\n- Endpoint: %s\n- Expected status: 200, 401, 403, 404, or 405\n- Actual status: %s\n- Timeout: 10s\n- Workflow run: %s/%s/actions/runs/%s\n- Checked at: %s\n" \
                "Runtime health check failed for the GitHub App webhook endpoint." \
                "$ENDPOINT" \
                "${http_code:-no response}" \
                "$GITHUB_SERVER_URL" \
                "$GITHUB_REPOSITORY" \
                "$GITHUB_RUN_ID" \
                "$(date -u +"%Y-%m-%dT%H:%M:%SZ")")
              upsert_issue "$body"
              exit 1
              ;;
          esac

  cliproxy_health:
    name: CLIProxyAPI unauthenticated health
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 3
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check CLIProxyAPI models endpoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: 🚨 CLIProxyAPI unreachable
          ENDPOINT: https://cliproxy.jclee.me/v1/models
        run: |
          set -euo pipefail

          upsert_issue() {
            local body="$1"
            local issue_number
            issue_number=$(TITLE="$ISSUE_TITLE" gh issue list \
              --repo "$HEALTH_ISSUE_REPO" \
              --state open \
              --search "$ISSUE_TITLE in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
              | head -n 1 || true)

            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --repo "$HEALTH_ISSUE_REPO" --body "$body"
            else
              gh issue create --repo "$HEALTH_ISSUE_REPO" --title "$ISSUE_TITLE" --body "$body"
            fi
          }

          http_code=$(curl -sS -o /tmp/cliproxy_health.json -w "%{http_code}" --max-time 10 "$ENDPOINT" || true)
          if [ "$http_code" = "401" ]; then
            echo "CLIProxyAPI responded with expected HTTP 401"
          else
            body=$(printf "%s\n\n- Endpoint: %s\n- Expected status: 401 without auth\n- Actual status: %s\n- Timeout: 10s\n- Workflow run: %s/%s/actions/runs/%s\n- Checked at: %s\n" \
              "Runtime health check failed for CLIProxyAPI." \
              "$ENDPOINT" \
              "${http_code:-no response}" \
              "$GITHUB_SERVER_URL" \
              "$GITHUB_REPOSITORY" \
              "$GITHUB_RUN_ID" \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")")
            upsert_issue "$body"
            exit 1
          fi

  bot_canary:
    name: jclee-bot canary review
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Create canary PR and verify bot response
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: 🚨 jclee-bot not responding to reviews
          CANARY_REPO: jclee941/automation-e2e-public
          BOT_LOGIN: jclee-bot[bot]
        run: |
          set -euo pipefail

          branch="feat/runtime-health-canary-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          file_path="runtime-health-canary.txt"
          pr_number=""

          upsert_issue() {
            local body="$1"
            local issue_number
            issue_number=$(TITLE="$ISSUE_TITLE" gh issue list \
              --repo "$HEALTH_ISSUE_REPO" \
              --state open \
              --search "$ISSUE_TITLE in:title" \
              --json number,title \
              --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" \
              | head -n 1 || true)

            if [ -n "$issue_number" ]; then
              gh issue comment "$issue_number" --repo "$HEALTH_ISSUE_REPO" --body "$body"
            else
              gh issue create --repo "$HEALTH_ISSUE_REPO" --title "$ISSUE_TITLE" --body "$body"
            fi
          }

          cleanup() {
            if [ -n "$pr_number" ]; then
              gh pr close "$pr_number" --repo "$CANARY_REPO" --comment "Closing runtime health canary PR." || true
            fi
            gh api -X DELETE "repos/$CANARY_REPO/git/refs/heads/$branch" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          fail_canary() {
            local reason="$1"
            local body
            body=$(printf "%s\n\n- Canary repo: %s\n- Branch: %s\n- PR: %s\n- Failure: %s\n- Expected: a %s comment after posting /review\n- Wait time: 10 minutes\n- Workflow run: %s/%s/actions/runs/%s\n- Checked at: %s\n" \
              "Runtime health canary failed for jclee-bot review handling." \
              "$CANARY_REPO" \
              "$branch" \
              "${pr_number:-not created}" \
              "$reason" \
              "$BOT_LOGIN" \
              "$GITHUB_SERVER_URL" \
              "$GITHUB_REPOSITORY" \
              "$GITHUB_RUN_ID" \
              "$(date -u +"%Y-%m-%dT%H:%M:%SZ")")
            upsert_issue "$body"
            exit 1
          }

          default_branch=$(gh repo view "$CANARY_REPO" --json defaultBranchRef --jq '.defaultBranchRef.name')
          base_sha=$(gh api "repos/$CANARY_REPO/git/ref/heads/$default_branch" --jq '.object.sha')

          gh api -X POST "repos/$CANARY_REPO/git/refs" \
            -f ref="refs/heads/$branch" \
            -f sha="$base_sha" >/dev/null \
            || fail_canary "failed to create canary branch"

          content="runtime health canary run $GITHUB_RUN_ID attempt $GITHUB_RUN_ATTEMPT at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          encoded_content=$(printf "%s\n" "$content" | base64 -w 0)
          gh api -X PUT "repos/$CANARY_REPO/contents/$file_path" \
            -f message="test: update runtime health canary" \
            -f content="$encoded_content" \
            -f branch="$branch" >/dev/null \
            || fail_canary "failed to write canary file"

          pr_number=$(gh pr create \
            --repo "$CANARY_REPO" \
            --base "$default_branch" \
            --head "$branch" \
            --title "test: runtime health canary" \
            --body "Runtime health canary for jclee-bot review handling. Do not merge." \
            --json number \
            --jq '.number') \
            || fail_canary "failed to create canary PR"

          gh pr comment "$pr_number" --repo "$CANARY_REPO" --body "/review" \
            || fail_canary "failed to post /review comment"

          echo "Waiting 10 minutes for $BOT_LOGIN to respond to $CANARY_REPO#$pr_number"
          sleep 600

          bot_comment_count=$(gh api "repos/$CANARY_REPO/issues/$pr_number/comments?per_page=100" \
            --jq "[.[] | select(.user.login == \"$BOT_LOGIN\")] | length") \
            || fail_canary "failed to read canary PR comments"

          if [ "$bot_comment_count" -lt 1 ]; then
            fail_canary "no $BOT_LOGIN comment found after /review"
          fi

          echo "$BOT_LOGIN responded with $bot_comment_count comment(s)"
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 ${{ github.workflow }} failed: ${context.runId}`,
              body: `${{ github.workflow }} workflow failed. See [run logs](${context.payload.repository.html_url}/actions/runs/${context.runId}).`
              });
            } catch (e) {
              core.warning(`Could not create issue: ${e.message}`);
            }
