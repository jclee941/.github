name: Repository Health Check

on:
  push:
    branches: [master]
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'templates/**'
      - '.github/workflows/31_repo-health.yml'
      - 'config/repos.yaml'
  workflow_run:
    workflows: ["Sanity"]
    types: [completed]
  workflow_dispatch:
permissions:
  contents: read

concurrency:
  group: repo-health-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: false

jobs:
  discover-repos:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 5
    outputs:
      repos: ${{ steps.discover.outputs.repos }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Discover repos
        id: discover
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          repos=$(cd scripts && go run ./cmd/repo-review --print-default-repos \
            | jq -R -c 'split(",")')
          echo "repos=$repos" >> "$GITHUB_OUTPUT"
          echo "Discovered repos: $repos"

  check-health:
    needs: discover-repos
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.discover-repos.outputs.repos) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check repository health
        uses: actions/github-script@v9
        env:
          REPO_NAME: ${{ matrix.repo }}
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const repo = process.env.REPO_NAME;
            const owner = context.repo.owner;
            const requiredFiles = [
              { path: 'README.md', label: 'documentation', critical: true },
              { path: 'CONTRIBUTING.md', label: 'documentation', critical: false },
              { path: 'LICENSE', label: 'legal', critical: true },
            ];

            const missing = [];
            for (const file of requiredFiles) {
              try {
                await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: file.path,
                });
              } catch (e) {
                if (e.status === 404) {
                  missing.push(file);
                  continue;
                }
                throw e;
              }
            }

            if (missing.length === 0) {
              console.log(`✅ ${repo}: all required files present; jclee-bot App issue maintenance handles any recovered repo-health issues`);
              return;
            }

            const criticalMissing = missing.filter(f => f.critical);
            const severity = criticalMissing.length > 0 ? 'required' : 'recommended';
            const missingList = missing.map(f => `${f.path}${f.critical ? ' (required)' : ' (recommended)'}`).join(', ');
            console.log(`⚠️ ${repo}: missing ${severity} repo-health files: ${missingList}`);
            console.log('jclee-bot App standardization and issue-maintenance paths own remediation and issue mutation.');
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
