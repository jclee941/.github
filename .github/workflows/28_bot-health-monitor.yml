name: Bot Health Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC (15:00 KST)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: bot-health-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Check CLIProxyAPI connectivity
        id: cliproxy
        env:
          CLIPROXY_API_KEY: ${{ secrets.CLIPROXY_API_KEY }}
        run: |
          if [ -z "$CLIPROXY_API_KEY" ]; then
            echo "cliproxy_ok=false" >> "$GITHUB_OUTPUT"
            echo "cliproxy_error=CLIPROXY_API_KEY secret not set" >> "$GITHUB_OUTPUT"
          else
            HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
              --max-time 15 \
              https://cliproxy.jclee.me/v1/models \
              -H "Authorization: Bearer $CLIPROXY_API_KEY" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "cliproxy_ok=true" >> "$GITHUB_OUTPUT"
            else
              echo "cliproxy_ok=false" >> "$GITHUB_OUTPUT"
              echo "cliproxy_error=HTTP $HTTP_CODE" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check jclee-bot review activity
        id: bot_activity
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          CUTOFF=$(date -u -d '48 hours ago' +%Y-%m-%dT%H:%M:%SZ)

          # Use the search API to find issues/PRs the bot has touched in the
          # last 48h instead of paginating every repo's /pulls + /pulls/comments.
          # `commenter:` covers PR comments and issue comments. `total_count`
          # is capped at 1000 by the search API but anything >0 means alive.
          QUERY="commenter:jclee-bot[bot] user:jclee941 updated:>=$CUTOFF"
          REVIEW_COUNT=$(gh api -X GET search/issues \
            -f q="$QUERY" \
            -f per_page=1 \
            --jq '.total_count' 2>/dev/null || echo 0)

          echo "review_count=$REVIEW_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$REVIEW_COUNT" -gt 0 ]; then
            echo "bot_active=true" >> "$GITHUB_OUTPUT"
          else
            echo "bot_active=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate health
        id: health
        run: |
          CLIPROXY_OK="${{ steps.cliproxy.outputs.cliproxy_ok }}"
          BOT_ACTIVE="${{ steps.bot_activity.outputs.bot_active }}"
          REVIEW_COUNT="${{ steps.bot_activity.outputs.review_count }}"

          if [ "$CLIPROXY_OK" = "true" ] && [ "$BOT_ACTIVE" = "true" ]; then
            echo "status=healthy" >> "$GITHUB_OUTPUT"
            echo "summary=OK - CLIProxyAPI up, $REVIEW_COUNT reviews in 48h" >> "$GITHUB_OUTPUT"
          elif [ "$CLIPROXY_OK" != "true" ]; then
            echo "status=critical" >> "$GITHUB_OUTPUT"
            echo "summary=FAIL - CLIProxyAPI unreachable" >> "$GITHUB_OUTPUT"
          else
            echo "status=critical" >> "$GITHUB_OUTPUT"
            echo "summary=FAIL - jclee-bot silent (0 reviews in 48h)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update alert issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ steps.health.outputs.status }}"
          SUMMARY="${{ steps.health.outputs.summary }}"
          TITLE='[bot-health] jclee-bot critical alert'

          if [ "$STATUS" = "healthy" ]; then
            ISSUES=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "bot-health,critical" --state open --json number --jq '.[].number')
            for NUM in $ISSUES; do
              gh issue close "$NUM" --repo "$GITHUB_REPOSITORY" --comment "Bot health restored - $SUMMARY" 2>/dev/null || true
            done
            echo "Bot is healthy. $SUMMARY"
            exit 0
          fi

          # shellcheck disable=SC2016  # printf format strings must use single quotes
          BODY=$(printf '%s\n' '## Bot Health Alert' '' "$SUMMARY" '' '### Timestamp' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '' '### Checklist' '- [ ] Verify CLIProxyAPI container is running on LXC 114' '- [ ] Check GitHub App webhook delivery logs: https://github.com/settings/apps/jclee-bot/advanced' '- [ ] Review container logs on LXC 114: `ssh root@192.168.50.114 "docker logs github-bot-app"`' '- [ ] Test CLIProxyAPI manually: `curl https://cliproxy.jclee.me/v1/models`' '' '_Auto-generated by bot-health-monitor workflow._')

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "bot-health,critical" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY" 2>/dev/null || true
            echo "Updated alert issue #$EXISTING"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY" --label "bot-health,critical,automation"
            echo "Created critical alert issue"
          fi
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
