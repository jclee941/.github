name: Bot Health Monitor

on:
  workflow_run:
    workflows: ["Build and Push App Image", "PR Review (CLIProxyAPI)", "Security Audit"]
    types: [completed]
  repository_dispatch:
    types: [bot-health-monitor]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bot-health-monitor-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  monitor:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Delegate bot health to jclee-bot
        env:
          NATIVE_HEALTH_TOKEN: ${{ secrets.NATIVE_HEALTH_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          CLIPROXY_API_KEY: ${{ secrets.CLIPROXY_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NATIVE_HEALTH_TOKEN:-}" ]; then
            echo "::error::NATIVE_HEALTH_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured"
            exit 1
          fi
          if [ -z "${CLIPROXY_API_KEY:-}" ]; then
            echo "::error::CLIPROXY_API_KEY is not configured"
            exit 1
          fi
          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg cliproxy_api_key "$CLIPROXY_API_KEY" \
            '{repository: $repo, checks: ["bot_health"], CLIPROXY_API_KEY: $cliproxy_api_key}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 180 \
            -X POST "https://bot.jclee.me/api/v1/native_health" \
            -H "Authorization: Bearer ${NATIVE_HEALTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '(.checks | all(.status == "healthy")) and (.actions | type == "array")' >/dev/null
