name: Bot Health Monitor

on:
  workflow_run:
    workflows: ["Build and Push App Image", "PR Review (CLIProxyAPI)", "Security Audit"]
    types: [completed]
  repository_dispatch:
    types: [bot-health-monitor]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bot-health-monitor-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  monitor:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Delegate bot health to jclee-bot
        env:
          NATIVE_HEALTH_TOKEN: ${{ secrets.NATIVE_HEALTH_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NATIVE_HEALTH_TOKEN:-}" ]; then
            echo "::error::NATIVE_HEALTH_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured"
            exit 1
          fi
          payload="$(jq -cn \
            --arg repo "$GITHUB_REPOSITORY" \
            '{repository: $repo, checks: ["bot_health"]}')"
          response="$(curl -fsS --retry 3 --retry-delay 5 --max-time 180 \
            -X POST "https://bot.jclee.me/api/v1/native_health" \
            --config <(printf 'header = "Authorization: %s %s"\n' "Bearer" "${NATIVE_HEALTH_TOKEN}") \
            -H "Content-Type: application/json" \
            -d "$payload")"
          jq -r '.checks[]? | "::notice title=Native health::\(.name) \(.status): \(.summary)"' <<<"$response"
          jq -r 'select(.issue_error?) | "::warning title=Native health issue actions::\(.issue_error)"' <<<"$response"
          jq -e '(.checks | all(.status == "healthy")) and (.actions | type == "array")' <<<"$response" >/dev/null
