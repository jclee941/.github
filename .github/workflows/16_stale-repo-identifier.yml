name: Stale Repository Identifier

on:
  push:
    branches: [master]
  # NOTE: no `issues:` trigger — this workflow CREATES issues, which would
  # re-trigger it via GH_PAT (feedback loop). Driven by push + workflow_run.
  workflow_run:
    workflows: ["Sanity", "Auto Deploy Workflows"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: stale-repo-identifier
  cancel-in-progress: false

jobs:
  identify:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'
      - name: Identify stale repos
        id: stale
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIPROXY_API_KEY: ${{ secrets.CLIPROXY_API_KEY }}
        run: |
          set -eu
          CUTOFF=$(date -u -d '90 days ago' +%Y-%m-%dT%H:%M:%SZ)
          STALE_REPOS=""

          REPOS=$(gh api users/jclee941/repos --paginate --jq '.[] | select(.archived == false) | .name' 2>/dev/null | sort)
          if [ -z "$REPOS" ]; then
            echo "warning: could not fetch repo list from org"
            exit 0
          fi

          for REPO in $REPOS; do
            # Get last commit date on default branch
            LAST_COMMIT=$(gh api "repos/jclee941/$REPO/commits?sha=$(gh repo view "jclee941/$REPO" --json defaultBranchRef --jq '.defaultBranchRef.name' 2>/dev/null || echo master)" \
              --jq '.[0].commit.committer.date' 2>/dev/null || echo "")

            if [ -z "$LAST_COMMIT" ]; then
              echo "warning: could not fetch commits for $REPO"
              continue
            fi

            DAYS_IDLE=$(( ($(date +%s) - $(date -d "$LAST_COMMIT" +%s)) / 86400 ))
            LLM_INPUT="${RUNNER_TEMP}/repo-stale-${REPO}.json"
            LLM_OUTPUT="${RUNNER_TEMP}/repo-stale-${REPO}.out"
            export REPO LAST_COMMIT DAYS_IDLE CUTOFF LLM_INPUT
            python3 -c "import json,os; json.dump({'repo':os.environ['REPO'],'last_commit':os.environ['LAST_COMMIT'],'days_idle':int(os.environ['DAYS_IDLE']),'cutoff':os.environ['CUTOFF']}, open(os.environ['LLM_INPUT'],'w'))" || true
            python3 scripts/llm_decide.py \
              --decision-type repo-stale \
              --input "$LLM_INPUT" \
              --output "$LLM_OUTPUT" || true
            LLM_OK=$(grep '^ok=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)
            LLM_ACTION=$(grep '^action=' "$LLM_OUTPUT" 2>/dev/null | tail -1 | cut -d= -f2- || true)

            if [ "$LLM_OK" = "true" ]; then
              if [ "$LLM_ACTION" = "stale" ]; then
                STALE_REPOS="${STALE_REPOS}- **$REPO**: last commit $LAST_COMMIT ($DAYS_IDLE days ago) [llm]\n"
              fi
            elif [[ "$LAST_COMMIT" < "$CUTOFF" ]]; then
              STALE_REPOS="${STALE_REPOS}- **$REPO**: last commit $LAST_COMMIT ($DAYS_IDLE days ago)\n"
            fi
          done

          if [ -z "$STALE_REPOS" ]; then
            echo "stale_found=false" >> "$GITHUB_OUTPUT"
            echo "No stale repositories detected."
            exit 0
          fi

          echo "stale_found=true" >> "$GITHUB_OUTPUT"
          {
            echo "stale_list<<EOF"
            echo "$STALE_REPOS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update stale repo issue
        if: steps.stale.outputs.stale_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STALE_LIST: ${{ steps.stale.outputs.stale_list }}
        run: |
          set -eu
          TITLE='[stale-repos] Repositories with no activity in 90 days'
          BODY=$(printf '%s\n' '## Stale Repository Report' '' 'The following repositories have had no commits in the last 90 days:' '' "$STALE_LIST" '' '### Suggested Actions' '- Review if the repository is still needed' '- Archive if no longer maintained' '- Update documentation if intentionally dormant' '' '_Auto-generated by stale-repo-identifier workflow._')

          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "stale-repos" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" --body "$BODY" \
              || echo "::warning::failed to comment on stale-repos issue #$EXISTING"
            echo "Updated stale repo issue #$EXISTING"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY" --label "stale-repos,automation"
            echo "Created stale repo issue"
          fi
      - name: Checkout (for composite action resolution)
        if: failure()
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
