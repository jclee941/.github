name: PR Auto Merge

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-auto-merge-retired-${{ github.ref }}
  cancel-in-progress: false

jobs:
  retired:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report App ownership
        run: |
          echo "PR auto-merge enablement is owned by the jclee-bot GitHub App."
          echo "This workflow no longer reviews, labels, or merges pull requests."
