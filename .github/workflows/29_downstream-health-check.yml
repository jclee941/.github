name: Downstream Health Check

# Automated monitoring of critical workflows across all jclee941/* repos.
# Creates a consolidated issue when any downstream repo has failing checks.
# Closes the issue when all repos are green.

on:
  workflow_run:
    workflows: ["Sanity"]
    types: [completed]
  repository_dispatch:
    types: [downstream-health-check]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: downstream-health-check-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ github.repository_visibility == 'private' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: 10
    name: Check downstream workflow health

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      # Default-path checkout MUST come first: actions/checkout cleans the
      # workspace root, which would wipe a previously-checked-out subdir.
      - name: Checkout local actions
        uses: actions/checkout@v6
        with:
          repository: jclee941/jclee-bot
          ref: master
          fetch-depth: 1

      - name: Checkout repository inventory
        uses: actions/checkout@v6
        with:
          repository: jclee941/jclee-bot
          path: .github-inventory

      - name: Set up Python 3.12
        uses: ./.github/actions/setup-python-compatible
        with:
          python-version: '3.12'

      - name: Check latest workflow runs across all repos
        id: health
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          REPOS=$(cd scripts && go run ./cmd/repo-review --print-default-repos)
          if [ -z "$REPOS" ]; then
            echo "warning: could not resolve managed repo inventory"
            exit 0
          fi
          # Per-repo CI conclusions (actionlint, pr-checks, gitleaks) are no longer the right signal:
          # downstream CI is now App-driven (jclee-bot App + GitHub-native CodeQL/Dependabot). The per-
          # workflow conclusion sweep is intentionally left empty so the job is a clean no-op success;
          # the issue-close step below will retire any pre-existing health-check issue.
          WORKFLOWS=()
          FAILURES=()

          for REPO in $(echo "$REPOS" | tr ',' ' '); do
            FULL="jclee941/$REPO"
            for WF in "${WORKFLOWS[@]}"; do
              # Tolerate repos/workflows that don't exist: gh exits non-zero
              # ("could not find any workflows named ...") which would abort the
              # step under bash -e. Fall back to empty and skip via the check below.
              LATEST=$(gh run list -R "$FULL" --workflow "$WF" --limit 1 --json conclusion,status,createdAt --jq '.[0]' 2>/dev/null || true)
              if [ -z "$LATEST" ] || [ "$LATEST" = "[]" ]; then
                continue
              fi
              CONCLUSION=$(echo "$LATEST" | jq -r '.conclusion')
              if [ "$CONCLUSION" != "success" ] && [ "$CONCLUSION" != "" ]; then
                FAILURES+=("- $FULL \`$WF\` → conclusion=\`$CONCLUSION\`")
              fi
            done
          done

          if [ ${#FAILURES[@]} -gt 0 ]; then
            {
              echo "failures_found=true"
              echo "count=${#FAILURES[@]}"
              echo "details<<EOF"
              printf '%s\n' "${FAILURES[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "failures_found=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update health-check issue
        if: steps.health.outputs.failures_found == 'true'
        env:
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
          DETAILS: ${{ steps.health.outputs.details }}
        run: |
          set -u
          if [ -z "${ISSUE_COMMANDS_TOKEN:-}" ]; then
            echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot issue command."
            exit 0
          fi

          TITLE="[health-check] Downstream workflow failures detected"
          BODY=$(printf '%s\n' \
            '## Downstream Workflow Health Check Failures' \
            '' \
            'The following critical workflows have non-success conclusions in downstream repos:' \
            '' \
            "$DETAILS" \
            '' \
            '---' \
            '' \
            "> Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '' \
            '_jclee-bot에의해자동화됨._')
          payload="$(jq -cn \
            --arg repo "${{ github.repository }}" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            '{repository: $repo, commands: [{type: "upsert_issue", title: $title, body: $body, update_body: true, labels: ["health-check", "automated"]}]}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
            -X POST "https://bot.jclee.me/api/v1/issue_commands" \
            -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '.actions | type == "array"' >/dev/null

      - name: Close health-check issue if all green
        if: steps.health.outputs.failures_found == 'false'
        env:
          ISSUE_COMMANDS_TOKEN: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
        run: |
          set -u
          if [ -z "${ISSUE_COMMANDS_TOKEN:-}" ]; then
            echo "::warning::ISSUE_COMMANDS_TOKEN/APP_ISSUE_MAINTENANCE_TOKEN is not configured; skipping jclee-bot issue command."
            exit 0
          fi

          TITLE="[health-check] Downstream workflow failures detected"
          COMMENT="All downstream workflows are now green. Resolved at $(date -u +%Y-%m-%dT%H:%M:%SZ)."$'\n\n''_jclee-bot에의해자동화됨._'
          payload="$(jq -cn \
            --arg repo "${{ github.repository }}" \
            --arg title "$TITLE" \
            --arg comment "$COMMENT" \
            '{repository: $repo, commands: [{type: "close_matching_issues", title_contains: $title, labels: ["health-check"], comment: $comment}]}')"
          curl -fsS --retry 3 --retry-delay 5 --max-time 120 \
            -X POST "https://bot.jclee.me/api/v1/issue_commands" \
            -H "Authorization: Bearer ${ISSUE_COMMANDS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            | jq -e '.actions | type == "array"' >/dev/null
      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-on-failure
        with:
          jclee-bot-token: ${{ secrets.ISSUE_COMMANDS_TOKEN || secrets.APP_ISSUE_MAINTENANCE_TOKEN }}
