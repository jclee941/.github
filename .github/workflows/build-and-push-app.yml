name: Build and Push App Image

on:
  push:
    branches: [master]
    paths:
      - 'pr_agent/**'
      - 'Dockerfile.github_app'
      - 'docker-compose.github_app.yml'
      - '.pr_agent.toml'
      - 'requirements.txt'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to private registry
        id: login
        uses: docker/login-action@v3
        with:
          registry: registry.jclee.me
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.github_app
          push: true
          tags: registry.jclee.me/github-bot-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
